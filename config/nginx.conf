user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ===================================================================
    # Logging Configuration
    # ===================================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # ===================================================================
    # Performance Tuning
    # ===================================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # ===================================================================
    # Gzip Compression
    # ===================================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;

    # ===================================================================
    # Cache Configuration
    # ===================================================================
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=comserv_cache:10m 
                     max_size=1g inactive=60m use_temp_path=off;

    # ===================================================================
    # Rate Limiting
    # ===================================================================
    limit_req_zone $binary_remote_addr zone=general_api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_api:10m rate=5r/m;

    # ===================================================================
    # Upstream Application Server
    # ===================================================================
    upstream comserv_backend {
        server web:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ===================================================================
    # HTTP Redirect (optional - uncomment for SSL enforcement)
    # ===================================================================
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # ===================================================================
    # Main Comserv Server Block
    # ===================================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # ===================================================================
        # Security Headers
        # ===================================================================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ===================================================================
        # SSL Configuration (uncomment for HTTPS)
        # ===================================================================
        # listen 443 ssl http2 default_server;
        # listen [::]:443 ssl http2 default_server;
        # ssl_certificate /etc/nginx/ssl/comserv.crt;
        # ssl_certificate_key /etc/nginx/ssl/comserv.key;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers HIGH:!aNULL:!MD5;
        # ssl_prefer_server_ciphers on;
        # ssl_session_cache shared:SSL:10m;
        # ssl_session_timeout 10m;

        # ===================================================================
        # Health Check Endpoint
        # ===================================================================
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ===================================================================
        # Static Assets (with Caching)
        # ===================================================================
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://comserv_backend;
            proxy_cache comserv_cache;
            proxy_cache_valid 200 30d;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            add_header Cache-Control "public, max-age=2592000, immutable";
            add_header X-Cache-Status $upstream_cache_status;
            expires 30d;
        }

        # ===================================================================
        # API Endpoints (Limited Rate, No Cache)
        # ===================================================================
        location ~ ^/api/ {
            limit_req zone=general_api burst=20 nodelay;
            proxy_pass http://comserv_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # ===================================================================
        # Login Endpoint (Strict Rate Limit)
        # ===================================================================
        location ~ ^/(login|signin|auth) {
            limit_req zone=login_api burst=5 nodelay;
            proxy_pass http://comserv_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===================================================================
        # Session/Cookie Endpoints (No Cache)
        # ===================================================================
        location ~ ^/(session|user|admin) {
            proxy_pass http://comserv_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # ===================================================================
        # Default Proxy Configuration
        # ===================================================================
        location / {
            proxy_pass http://comserv_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ===================================================================
        # Deny Access to Sensitive Files
        # ===================================================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ===================================================================
        # Error Pages
        # ===================================================================
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # ===================================================================
    # SSL Configuration (HTTPS Server Block)
    # ===================================================================
    # Uncomment and configure for HTTPS deployment
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name comserv.example.com;
    #
    #     ssl_certificate /etc/nginx/ssl/comserv.crt;
    #     ssl_certificate_key /etc/nginx/ssl/comserv.key;
    #     ssl_trusted_certificate /etc/nginx/ssl/comserv-chain.crt;
    #
    #     # Include all location blocks from above
    # }
}