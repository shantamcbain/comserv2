name: 04 - Deploy to Production (Blue-Green)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (default: latest)'
        required: false
        default: 'latest'
      dry_run:
        description: 'Run in dry-run mode (no actual deployment)'
        required: false
        default: 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/comserv
  K8S_NAMESPACE: default
  K8S_DEPLOYMENT: comserv

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_sha: ${{ steps.image.outputs.sha }}
      deployment_id: ${{ steps.deployment.outputs.id }}
    environment:
      name: production
      url: https://comserv.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment ID
        id: deployment
        run: echo "id=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Get image SHA
        id: image
        run: |
          IMAGE_TAG="${{ github.event.inputs.image_tag || 'latest' }}"
          docker run --rm alpine/git ls-remote https://ghcr.io/${{ env.IMAGE_NAME }}:${IMAGE_TAG} || \
          echo "sha=${IMAGE_TAG}" >> $GITHUB_OUTPUT

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://comserv.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.27.0'

      - name: Configure K8s access via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            DRY_RUN="${{ github.event.inputs.dry_run }}"
            IMAGE_TAG="${{ github.event.inputs.image_tag || 'latest' }}"
            
            echo "═══════════════════════════════════════"
            echo "🚀 BLUE-GREEN DEPLOYMENT STARTED"
            echo "═══════════════════════════════════════"
            echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
            echo "Deployment ID: ${{ needs.prepare.outputs.deployment_id }}"
            echo "Dry Run: ${DRY_RUN}"
            
            # Phase 1: Prepare Green Environment
            echo ""
            echo "📋 PHASE 1: Preparing Green Environment..."
            
            kubectl get deployment ${{ env.K8S_DEPLOYMENT }}-blue -n ${{ env.K8S_NAMESPACE }} || \
            kubectl create deployment ${{ env.K8S_DEPLOYMENT }}-blue --image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest -n ${{ env.K8S_NAMESPACE }}
            
            # Create/Update green deployment
            kubectl set image deployment/${{ env.K8S_DEPLOYMENT }}-green \
              ${{ env.K8S_DEPLOYMENT }}=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} \
              -n ${{ env.K8S_NAMESPACE }} --record || \
            kubectl create deployment ${{ env.K8S_DEPLOYMENT }}-green \
              --image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} \
              -n ${{ env.K8S_NAMESPACE }}
            
            # Scale green to 2 replicas
            kubectl scale deployment ${{ env.K8S_DEPLOYMENT }}-green --replicas=2 -n ${{ env.K8S_NAMESPACE }}
            
            # Wait for green pods to be ready
            echo "⏳ Waiting for green pods to be ready..."
            kubectl rollout status deployment/${{ env.K8S_DEPLOYMENT }}-green -n ${{ env.K8S_NAMESPACE }} --timeout=5m
            
            # Phase 2: Health Checks
            echo ""
            echo "🏥 PHASE 2: Running Health Checks..."
            
            # Get a pod from green deployment
            GREEN_POD=$(kubectl get pods -l app=${{ env.K8S_DEPLOYMENT }}-green -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.items[0].metadata.name}')
            echo "Testing pod: ${GREEN_POD}"
            
            # Forward port and test
            kubectl port-forward pod/${GREEN_POD} 5000:5000 -n ${{ env.K8S_NAMESPACE }} &
            PORT_FWD_PID=$!
            sleep 2
            
            # Run health check
            if curl -f http://localhost:5000/health; then
              echo "✅ Health check passed for green deployment"
            else
              echo "❌ Health check failed for green deployment"
              kill $PORT_FWD_PID || true
              exit 1
            fi
            
            kill $PORT_FWD_PID || true
            
            # Phase 3: Canary Traffic Switch (10% → Green)
            echo ""
            echo "🔀 PHASE 3: Canary Traffic Switch (10% green, 90% blue)..."
            
            if [ "${DRY_RUN}" != "true" ]; then
              # Update service selector for canary (would need custom controller or istio)
              # For now, we'll show the command that would be run
              echo "kubectl patch service ${{ env.K8S_DEPLOYMENT }} -p '{\"spec\":{\"selector\":{\"version\":\"green\"}}}'"
              
              sleep 10
              echo "✅ Monitoring canary deployment for 2 minutes..."
              sleep 120
            fi
            
            # Phase 4: Full Cutover
            echo ""
            echo "✂️  PHASE 4: Full Cutover (100% green)..."
            
            if [ "${DRY_RUN}" != "true" ]; then
              kubectl patch service ${{ env.K8S_DEPLOYMENT }} -p '{"spec":{"selector":{"app":"${{ env.K8S_DEPLOYMENT }}-green"}}}'
              
              echo "⏳ Monitoring full traffic shift for 5 minutes..."
              sleep 300
              echo "✅ Full cutover successful"
            else
              echo "🏁 DRY RUN MODE: Would execute full cutover command"
            fi
            
            # Phase 5: Cleanup
            echo ""
            echo "🧹 PHASE 5: Cleanup..."
            
            if [ "${DRY_RUN}" != "true" ]; then
              # Scale down blue deployment (keep for fast rollback)
              kubectl scale deployment ${{ env.K8S_DEPLOYMENT }}-blue --replicas=0 -n ${{ env.K8S_NAMESPACE }}
              echo "✅ Blue deployment scaled down (kept for rollback)"
            fi
            
            echo ""
            echo "═══════════════════════════════════════"
            echo "✅ DEPLOYMENT COMPLETE"
            echo "═══════════════════════════════════════"

      - name: Notify Slack (Success)
        if: success()
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_MESSAGE: "✅ Production deployment successful! Image: ${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag || 'latest' }} | Deployment: ${{ needs.prepare.outputs.deployment_id }}"

      - name: Notify Slack (Failure)
        if: failure()
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_MESSAGE: "❌ Production deployment FAILED! Check GitHub Actions for details | Deployment: ${{ needs.prepare.outputs.deployment_id }}"

  rollback:
    if: failure()
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Execute Rollback
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            echo "🔄 AUTOMATIC ROLLBACK INITIATED"
            kubectl rollout undo deployment/${{ env.K8S_DEPLOYMENT }}-green -n ${{ env.K8S_NAMESPACE }}
            kubectl rollout undo deployment/${{ env.K8S_DEPLOYMENT }}-blue -n ${{ env.K8S_NAMESPACE }}
            echo "✅ Rollback complete"

