name: Deploy to Servers

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-development:
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'development')
    runs-on: ubuntu-latest
    environment: development
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to development server
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.DEV_SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H ${{ secrets.DEV_SERVER_HOST }} >> ~/.ssh/known_hosts
        
        ssh -i ~/.ssh/deploy_key -l ${{ secrets.DEV_SERVER_USER }} ${{ secrets.DEV_SERVER_HOST }} << 'EOF'
          set -e
          echo "🚀 Starting deployment to development..."
          
          cd ~/comserv2
          
          # Pull latest changes
          git fetch origin develop
          git checkout develop
          git pull origin develop
          
          # Login to container registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Pull latest image
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop
          
          # Bring up services with new image
          cd Comserv
          docker-compose -f docker-compose.dev.yml down || true
          docker-compose -f docker-compose.dev.yml up -d --pull always
          
          # Run migrations
          docker-compose -f docker-compose.dev.yml exec -T web-dev perl script/deploy_schema.pl
          
          # Wait for health check
          sleep 10
          docker-compose -f docker-compose.dev.yml ps
          
          echo "✅ Development deployment complete"
        EOF
    
    - name: Notify deployment
      if: always()
      run: |
        echo "✅ Development deployment: ${{ job.status }}"

  deploy-staging:
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to staging server
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.STAGING_SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H ${{ secrets.STAGING_SERVER_HOST }} >> ~/.ssh/known_hosts
        
        ssh -i ~/.ssh/deploy_key -l ${{ secrets.STAGING_SERVER_USER }} ${{ secrets.STAGING_SERVER_HOST }} << 'EOF'
          set -e
          echo "🚀 Starting deployment to staging..."
          
          cd ~/comserv2
          
          # Pull latest changes
          git fetch origin main
          git checkout main
          git pull origin main
          
          # Login to container registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Pull latest image
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
          
          # Bring up services with new image
          cd Comserv
          docker-compose -f docker-compose.staging.yml down || true
          docker-compose -f docker-compose.staging.yml up -d --pull always
          
          # Run migrations
          docker-compose -f docker-compose.staging.yml exec -T web-staging perl script/deploy_schema.pl
          
          # Health checks
          sleep 10
          docker-compose -f docker-compose.staging.yml ps
          
          echo "✅ Staging deployment complete"
        EOF
    
    - name: Run smoke tests
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.STAGING_SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H ${{ secrets.STAGING_SERVER_HOST }} >> ~/.ssh/known_hosts
        
        ssh -i ~/.ssh/deploy_key -l ${{ secrets.STAGING_SERVER_USER }} ${{ secrets.STAGING_SERVER_HOST }} << 'EOF'
          echo "🧪 Running smoke tests..."
          
          # Wait for app to be ready
          for i in {1..30}; do
            if curl -f http://localhost:5000/ > /dev/null 2>&1; then
              echo "✅ Application is responding"
              exit 0
            fi
            echo "Waiting for application... ($i/30)"
            sleep 1
          done
          
          echo "❌ Application failed to respond"
          exit 1
        EOF
    
    - name: Notify staging deployment
      if: always()
      run: |
        echo "✅ Staging deployment: ${{ job.status }}"

  deploy-production:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Production deployment confirmation
      run: |
        echo "📌 Production Deployment"
        echo "Tag: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo "This deployment requires manual approval via GitHub Environments"
    
    - name: Deploy to production server
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.PROD_SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H ${{ secrets.PROD_SERVER_HOST }} >> ~/.ssh/known_hosts
        
        ssh -i ~/.ssh/deploy_key -l ${{ secrets.PROD_SERVER_USER }} ${{ secrets.PROD_SERVER_HOST }} << 'EOF'
          set -e
          echo "🚀 Starting PRODUCTION deployment..."
          
          cd ~/comserv2
          
          # Backup current state
          git archive --format tar.gz HEAD --output ~/backups/comserv_$(date +%Y%m%d_%H%M%S).tar.gz
          
          # Pull latest tag
          git fetch origin tag ${{ github.ref_name }}
          git checkout ${{ github.ref_name }}
          
          # Login to container registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Pull latest image
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          
          # Bring up services with new image
          cd Comserv
          docker-compose -f docker-compose.prod.yml down || true
          docker-compose -f docker-compose.prod.yml up -d --pull always
          
          # Run migrations
          docker-compose -f docker-compose.prod.yml exec -T web-prod perl script/deploy_schema.pl
          
          # Health checks
          sleep 10
          docker-compose -f docker-compose.prod.yml ps
          
          echo "✅ Production deployment complete"
        EOF
    
    - name: Run production smoke tests
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.PROD_SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H ${{ secrets.PROD_SERVER_HOST }} >> ~/.ssh/known_hosts
        
        ssh -i ~/.ssh/deploy_key -l ${{ secrets.PROD_SERVER_USER }} ${{ secrets.PROD_SERVER_HOST }} << 'EOF'
          echo "🧪 Running production smoke tests..."
          
          for i in {1..30}; do
            if curl -f http://localhost:5000/ > /dev/null 2>&1; then
              echo "✅ Production application is responding"
              exit 0
            fi
            echo "Waiting for application... ($i/30)"
            sleep 1
          done
          
          echo "❌ Production application failed to respond"
          exit 1
        EOF
    
    - name: Send deployment notification
      if: always()
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {
            "text": "🚀 Production Deployment",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*${{ job.status == 'success' && '✅' || '❌' }} Comserv Production Deployed*\nVersion: ${{ github.ref_name }}\nStatus: ${{ job.status }}"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK