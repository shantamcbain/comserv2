❌ daily_plan_automator_design.tt       (Snake_case - WRONG)
❌ Daily Plan Automator Design.tt       (Spaces - WRONG)
❌ DailyPlanAutomator_Design.tt         (Mixed conventions - WRONG)
❌ dailyPlanAutomatorDesign.tt          (camelCase, not PascalCase - WRONG)

process_user_request                    (snake_case function - WRONG for new code)
validate_token_format                   (snake_case function - WRONG for new code)
fetch-documentation-page                (kebab-case function - WRONG for new code)
```

**How To Apply (Mandatory Pre-Action Checklist)**:

Before creating ANY new file, agents MUST execute this sequence:
1. **Step 1**: Determine the logical filename (concept name)
2. **Step 2**: Convert to PascalCase:
   - Split words at logical boundaries
   - Capitalize FIRST letter of each word
   - NO special characters between words
3. **Step 3**: Verify against examples above
4. **Step 4**: ONLY THEN create the file with PascalCase name
5. **Step 5**: Log filename verification in /updateprompt

**Step-by-Step Examples**:

Example 1 - Simple document:
```
Concept: "Daily audit document"
Words: Daily, Audit
PascalCase: DailyAudit.tt
✅ CORRECT - Created as DailyAudit.tt
```

Example 2 - Complex document:
```
Concept: "Master plan coordinator with daily synchronization"
Words: Master, Plan, Coordinator, Daily, Sync  → Shorten/combine
PascalCase: MasterPlanCoordinatorDailySync.tt
✅ CORRECT - Created as MasterPlanCoordinatorDailySync.tt
```

Example 3 - Document with acronyms:
```
Concept: "AI chat system master audit"
Words: AI, Chat, System, Master, Audit
PascalCase: AIChatSystemMasterAudit.tt
✅ CORRECT - Created as AIChatSystemMasterAudit.tt
```

**Enforcement Mechanism** (Runs at File Creation Time):

1. **Pre-Creation Check** (Automated):
   - Agent determines filename
   - Before Edit tool is called, agent logs planned filename to /updateprompt --phase before
   - Filename must be in PascalCase in the --files parameter
   - If not PascalCase: /updateprompt validation catches it → agent HALTS work

2. **During Creation** (Agent Responsibility):
   - Agent uses Edit or Write tool with PascalCase filename
   - Tools enforce: filename cannot contain special characters (system-level)
   
3. **Post-Creation Verification** (Mandatory):
   - Agent verifies file created with correct PascalCase name
   - /updateprompt --phase after must reference actual filename created
   - Mismatch between planned and created → Log as violation

**VIOLATION PENALTIES (Rule 8 Enforcement)**:

- **First Violation** (Non-PascalCase filename created):
  - DETECTION: Next agent's validation_step0.pl detects non-compliant filename
  - IMMEDIATE: /updateprompt logs "VIOLATION: File created with non-PascalCase name [filename]"
  - CORRECTION: Agent must rename file to PascalCase equivalent
  - PREVENTION: Update /updateprompt pre-work logging to catch next time
  
- **Second Violation** (Same chat):
  - Log escalation: "REPEATED PASCALCASE VIOLATION"
  - Execute /chathandoff with violation flag
  - Session continues with warning on next chat
  
- **Pattern Violation** (3+ violations across sessions):
  - Escalated to human review
  - Agent specification may require updates to mandatory_reads section
  - Review agent's file creation workflow and provide corrective training

**Integration with /updateprompt Workflow**:

When logging file creation work:

```bash
# CORRECT: Log PascalCase filename in --files parameter
perl UpdatePrompt.pl \
  --action "Create Daily Audit documentation" \
  --files "DailyAuditReport.tt"           ✅ (PascalCase)
  --success 1

# INCORRECT: Log non-PascalCase filename
perl UpdatePrompt.pl \
  --action "Create Daily Audit documentation" \
  --files "daily_audit_report.tt"         ❌ (snake_case - VIOLATION)
  --success 1
```

**Why This Rule Exists**:

1. **Consistency**: Flat namespace in Comserv routing requires predictable filenames
2. **Readability**: PascalCase is self-documenting (each word boundary clear)
3. **System Stability**: Special characters cause routing issues and URL encoding problems
4. **Search & Discovery**: PascalCase filenames are easier to find in documentation systems

**GRANDFATHER CLAUSE (Effective 2026-01-15)**:

Existing files in `.zencoder/rules/` that predate strict PascalCase enforcement are GRANDFATHERED:
- ❌ Rule 8 does NOT apply retroactively to files created before 2026-01-06
- ❌ Existing files with underscores/hyphens (AgentRegistry.md, DailyPlanAutomator*.md, etc.) are allowed to keep non-compliant names
- ✅ Rule 8 APPLIES STRICTLY to ALL new files created on or after 2026-01-15
- ✅ Any file added to repo after 2026-01-15 MUST follow PascalCase without exception

**Rationale for Grandfather Clause**:
- Renaming 9+ existing configuration files would require updating all references throughout codebase
- Existing files are in stable use and don't justify refactoring costs
- Strict enforcement from this point forward prevents future violations while maintaining stability

**Reference Materials**:

- Catalyst Naming Conventions: Controllers, Models, Views use PascalCase
- Comserv Documentation System: All .tt files stored with PascalCase names
- Zencoder Agent Files: All role specs and rule files must be PascalCase

