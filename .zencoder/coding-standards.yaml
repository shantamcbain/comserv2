### Rule 10: Documentation Format & Layout Standards (Mandatory)

**Status**: ✅ Active  
**Enforcement**: 🔴 CRITICAL - All live documentation must conform  
**Effective**: 2026-01-21 (Migrated from legacy Continue rules)

**THE RULES**:
1. **Format and Layout Consistency**: All live documentation MUST be Template Toolkit (.tt) ONLY. .md files are STRICTLY for Zencoder/AI drafts and must NEVER be referenced for publication.
2. **Template Usage**: Base EVERY file on `DocumentationTtTemplate.tt` exactly. Must include:
   - `[% META %]` block with accurate timestamp and author
   - `[% PageVersion %]` RCS line
   - `<div class="container">` with `.row/.col` grid layout
   - Inline CSS variables for theme compliance (e.g., `var(--text-color)`)
3. **Semantic HTML**: Use proper heading tags (`<h2 id="...">`), lists, and code blocks (`<pre><code>`).
4. **Navigation**: Each `.tt` file MUST have a self-contained Table of Contents (`id="toc"`) with absolute anchors.
5. **No .md Usage**: Reject `.md` for live docs. If a `.md` draft exists, it must be merged into a `.tt` file and the draft suggested for deletion.

