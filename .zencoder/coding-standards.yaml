## GLOBAL RULES (Mandatory for All Agents)

### Rule 1: ask_questions() - ONLY Method for User Input

**Status**: ✅ Active  
**Enforcement**: 🔴 CRITICAL - Blocks chat continuation  
**Consolidated Source**: This section (Rule 1) contains all ask_questions() enforcement rules

**THE RULE (Non-Negotiable)**:
- ❌ FORBIDDEN: Text questions (e.g., "Would you like me to apply the fix?")
- ❌ FORBIDDEN: Implied questions without structured options
- ✅ REQUIRED: Use `ask_questions()` function for ALL user input decisions

**Correct Syntax**:
```xml
<invoke name="zencoder-server__ask_questions">
  <parameter name="questions">[{
    "question": "Your question here?",
    "options": ["Option 1", "Option 2", "Option 3"]
  }]</parameter>
</invoke>
```

**When to Use**:
- User input needed before agent can proceed
- Multiple valid approaches exist
- Ambiguous requirements require clarification
- Trade-off decisions require user preference

**VIOLATION PENALTIES (Rule 1 Enforcement)**:
- **First Violation** (asking text question instead of ask_questions):
  - HALT work immediately
  - Log violation: "VIOLATION: Text question '[question text]' - must use ask_questions()"
  - Execute ask_questions() function immediately
  - Continue only after user responds
- **Second Violation** (same chat):
  - Log escalation: "MULTIPLE VIOLATIONS - Rule 1"
  - Execute /chathandoff immediately
  - Session ends with VIOLATION flag
- **Repeated Violations** (3+ across sessions):
  - Escalated to human review
  - Agent role suspended pending review
  - Training required before re-activation

**Execution Sequence** (CORRECT ORDER):
1. Do work
2. Execute /UpdatePrompt.pl to log what was done
3. Call ask_questions() function asking if done with task or ready for /chathandoff (include /chathandoff as an option)
4. **WAIT INDEFINITELY** for user response - do NOT continue or move to next task
5. Execute /UpdatePrompt.pl again with user's response logged, then act on answer

**Self-Detection Recovery**:
If agent realizes it asked a text question:
1. Log violation to prompts_log.yaml
2. Execute /UpdatePrompt.pl with problems noted
3. Immediately call ask_questions() with proper function
4. Wait for user response
5. Execute /UpdatePrompt.pl again with success

**Impact of Violation** (if workflow order is wrong):
- 🔴 Chat enters "finishing up loop" (agent asks question then waits instead of acting)
- 🔴 User must manually terminate chat
- 🔴 Agent continues conversation after asking, instead of ending prompt
- 🔴 Session history becomes fragmented with incomplete prompts
- 🔴 /chathandoff never executes properly because agent doesn't act on answer

**⚠️ CRITICAL FIX - ask_questions() NO TIMEOUT RULE (2026-01-15)**:

**THE PROBLEM**: ask_questions() tool was timing out before user could respond, breaking workflow.

**THE SOLUTION - NEW ENFORCEMENT**:
- ✅ **ZERO timeout on ask_questions()**: Tool MUST NOT timeout while waiting for user response
- ✅ **No phantom returns**: Tool return/completion ONLY happens when user provides response (not before)
- ✅ **Block all timeout mechanisms**: Any system-level timeout on ask_questions() call is FORBIDDEN
- ✅ **No time limit**: User response deadline is INFINITY - wait as long as needed
- ✅ **No async issues**: Call must be synchronous/blocking - agent CANNOT continue until user responds
- ✅ **On timeout error**: If tool returns timeout error, it's a SYSTEM BUG not agent behavior. Agent logs error, escalates to human (send error in next /updateprompt execution)

**Implementation Requirements** (ALL MANDATORY):
1. When calling ask_questions(), use EXACT syntax from Rule 1 (lines 132-137)
2. After ask_questions() call, agent code MUST END (no further code execution)
3. Tool will handle waiting - agent just calls it and stops
4. NEVER put ask_questions() inside loops or conditionals
5. NEVER add timeout/retry logic around ask_questions() call
6. If tool times out: This is IDE/system issue, not agent issue - log to prompts_log.yaml with full error details and escalate

**Why This Matters**: 
- ask_questions() is BLOCKING call - agent stops while waiting
- User sees questions immediately and can respond at any pace
- Timeout errors = system infrastructure problem requiring human intervention

