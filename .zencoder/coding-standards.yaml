## ⚠️ CRITICAL SETTINGS - READ FIRST (All Agents, Every Prompt)

### **DOCUMENTATION PATHS - NON-NEGOTIABLE**

**THIS RULE OVERRIDES ALL OTHER DOCUMENTATION GUIDANCE**

#### The Only Valid Documentation Format
```
/Documentation/FileName
```

**Format Rules:**
- **All files**: Use PascalCase (e.g., `/Documentation/Root`, `/Documentation/User`, `/Documentation/CloudflareIntegration`, `/Documentation/ProxmoxIntegration`)
- **Format**: Capitalize first letter of each word, no hyphens, no underscores, no lowercase
- **Examples**: Root, User, Project, Documentation, ComservSystems, CloudflareIntegration, ProxmoxIntegration

#### NEVER Use These (Automatic Failure):
```
❌ /Documents/FileName           (Wrong directory name)
❌ /Documentation/filename.tt    (No .tt extension, must use PascalCase)
❌ /Documentation/system/File    (No subdirectories in URL)
❌ /Documentation/file-name      (Hyphens not allowed, use PascalCase)
❌ /Documentation/file_name      (Underscores not allowed, use PascalCase)
✅ /Documentation/Root                             (PascalCase - correct)
✅ /Documentation/User                             (PascalCase - correct)
✅ /Documentation/CloudflareIntegration            (PascalCase - correct)
```

#### How Comserv Routing Works
- Files are stored in subdirectories: `root/Documentation/system/`, `root/Documentation/kubernetes/`, etc.
- The controller uses **flat namespace** - only the filename matters
- URL strips subdirectory and .tt extension
- `root/Documentation/system/K3S_QUICK_REFERENCE.tt` → `/Documentation/K3S_QUICK_REFERENCE`

#### Auto-Check Before Any Documentation Work
Before creating/editing/linking ANY documentation:
1. Check if path starts with `/Documentation/` ✅ or `/Documents/` ❌
2. Verify no `.tt` extension in URL
3. Verify no subdirectory path between `/Documentation/` and filename
4. **Verify PascalCase format** (Root, User, CloudflareIntegration - NOT lowercase, hyphens, or underscores)
5. If any wrong, STOP and ask user for correction

