### Rule 3a: Batch Edit Prohibition (Sequential-Only Operations)

**Status**: 🔴 CRITICAL - Prevents context loss and file corruption  
**Effective**: 2026-01-06  
**Reason**: Batch Edit Incident (Chat 25, Prompt 99) - 7 simultaneous Edit calls caused Missing toolUseContextDetails errors, string match failures, partial file corruption

**THE RULE (Non-Negotiable)**:
- ❌ FORBIDDEN: Multiple Edit calls in single batch/tool invocation block
- ✅ REQUIRED: ONE Edit call per execution cycle (read → edit → verify → repeat)
- ✅ REQUIRED: Verify file after EACH edit before proceeding
- ✅ REQUIRED: Log to prompts_log.yaml after completing work on each file

**Prohibited Pattern**:
```xml
❌ NEVER DO THIS:
<invoke name="Edit">...</invoke>
<invoke name="Edit">...</invoke>
<invoke name="Edit">...</invoke>
```

**Correct Pattern**:
```
✅ ALWAYS DO THIS:
1. /updateprompt --phase before
2. Read file once
3. Edit file (SINGLE edit)
4. Bash/Read to verify
5. If more edits needed:
   a. Go back to step 3 (edit again)
   b. Verify again
   c. Repeat until file complete
6. /updateprompt --phase after (for this file)
7. Next file: Start from step 1
```

**Why This Matters**:
- Tool context is lost when making rapid multiple calls
- File state changes after each edit
- old_string patterns no longer match after edits applied
- Result: "Missing toolUseContextDetails" errors and string match failures
- Verification prevents silent partial failures

**Multi-File Work Execution** (When user requests "fix 2 files"):
```
✅ CORRECT: Separate phases per file
Phase 1: Complete file A fully (all edits, final /updateprompt)
Phase 2: Complete file B fully (separate read/edit cycle, final /updateprompt)

❌ WRONG: Try to do both files in one prompt
File A: Edit 1, Edit 2, Edit 3, ...  (no verification between edits)
File B: Edit 1, Edit 2, Edit 3, ...  (causes context loss, failures)
```

**VIOLATION PENALTIES (Rule 3a Enforcement)**:
- **First Violation** (batch edits attempted):
  - IMMEDIATE: Log to prompts_log.yaml with "BATCH EDIT VIOLATION"
  - Revert to sequential execution
  - Verify all file edits succeed
  - Document what failed and why
- **Second Violation** (same agent in same chat):
  - Log escalation: "REPEATED BATCH EDIT VIOLATION"
  - Execute /chathandoff immediately
  - Agent role review required
- **Third+ Violations**:
  - Escalated to human review
  - Agent role may be suspended
  - Full audit preserved with pattern analysis

