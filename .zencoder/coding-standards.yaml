### Rule 5: Keyword Execution Protocol

**Status**: ✅ Active  
**Enforcement**: 🔴 CRITICAL - Keywords are direct orders  
**Consolidated Source**: This section (Rule 5) contains all keyword execution rules

**Active Keywords**:
- `/chathandoff` - Chat tracking within session
- `/sessionhandoff` - Session archival and reset
- `/validatett` - Template Toolkit validation
- (Legacy: `/updateprompt` - Now a workflow script, not keyword)

**Disabled Keywords** (Awaiting Docker/App Restoration):
- `/checktodos` - Docker backend unavailable
- `/dotodo` - Docker backend unavailable
- `/createnewtodo` - Docker backend unavailable
- `/createnewproject` - Docker backend unavailable

**Execution Protocol**:
1. Detect keyword (slash format or legacy format)
2. STOP all current work immediately
3. IMMEDIATELY execute keyword per specification
4. Log execution to prompts_log.yaml
5. Continue with next task or exit per keyword behavior

**Critical Rules**:
- ❌ FORBIDDEN: Asking about keywords or treating them as questions
- ❌ FORBIDDEN: Continuing analysis while keyword detected
- ✅ REQUIRED: Execute keywords WITHOUT DELAY

**VIOLATION PENALTIES (Rule 5 Enforcement)**:
- **Keyword Delayed or Ignored**:
  - IMMEDIATE: /updateprompt with "VIOLATION: Keyword not executed immediately"
  - Execute keyword immediately (no delays)
  - Re-check execution: keyword should complete before anything else
- **Keyword Mishandled**:
  - Example: Agent asked "Do you mean /chathandoff?" instead of executing it
  - IMMEDIATE: Execute keyword WITHOUT asking clarification
  - Log violation: "VIOLATION: Keyword treated as question instead of direct order"
- **Impact**: Keywords are DIRECT ORDERS. No discussion, no questions, no delays.

