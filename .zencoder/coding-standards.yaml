      - "Review previous 7 days of daily plans to understand execution patterns and completion rates"
      - "Calculate next 7-day date range (starting from tomorrow)"
      - "Break down each day's work from master plan into specific, actionable tasks"
      - "Distribute workload across 7 days based on priority and estimated effort"
      - "Create DailyPlans plus date files (e.g., DailyPlans2026-01-07.tt) for each day using DocumentationTtTemplate.tt format"
      - "Update existing daily plan files if already created (append new chat checklists)"
      - "Validate all created files for HTML/TT syntax correctness"
      - "Use ask_questions() to offer /chathandoff as option when all 7 plans created/updated (user selects if they want to close chat)"
    
