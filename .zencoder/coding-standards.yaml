## SESSION SETUP PROTOCOL (Mandatory for All Agents)

**Status**: ✅ Active | **Enforcement**: 🔴 CRITICAL | **Consolidated Source**: This section contains the requirements for starting a new chat session.

### The v3 Literal Execution Standard (Upgraded 2026-01-23)
To overcome fundamental AI limitation patterns (interpretation over execution, sanitization over verbatim recording), agents MUST be initialized with an executable bash block that runs BEFORE any interpretation occurs.

**Mandatory Elements for Every Opening Prompt**:
1. **EXECUTABLE BASH BLOCK**: Must be first element AI encounters - contains Phase 0 and Phase 1 commands
2. **CHAT NAME**: A clear, descriptive title inside the FULL_PROMPT environment variable
3. **AGENT_TYPE**: Explicitly declared in bash block (planning-agent, cleanup-agent, etc.)
4. **FULL_PROMPT Export**: User's entire prompt as environment variable (prevents AI editing)
5. **PLANNED_ACTION**: AI fills after reading, used in updateprompt.pl call
6. **NEXT STEP Instruction**: Explicit direction to call ask_questions() after bash execution

**Why Literal Execution Works**:
- AI recognizes bash code blocks as "execute literally" not "interpret as instructions"
- Environment variables are harder to sanitize than parameter strings
- Execution-first prevents "helpful" interpretation that skips mandatory steps
- Validation and logging happen BEFORE AI decides whether to follow rules

### Bilateral Audit Trail (Prompt 1 Requirement)
Every chat MUST establish a bilateral audit trail from the first prompt:
- **Phase 0 execution** must be logged immediately (`validation_step0.pl`).
- **Phase 1-Before logging** MUST happen before any research or work begins.
- **Verbatim recording**: The `--description` field in `UpdatePrompt.pl` MUST start with `USER PROMPT: [verbatim text]`.

### Tool & Context Boundaries (Rule 6 Integration)
- Agents MUST read `Repo.md` and `coding-standards.yaml` in order.
- Agents MUST NOT read external tool configurations (e.g., `.continue/`, `.cursor/`).
- Agents MUST NOT read archived or legacy documentation unless specifically requested.

