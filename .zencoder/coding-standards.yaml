## GLOBAL ENFORCEMENT PROTOCOL (ALL AGENTS - NON-BYPASSABLE)

**Status**: 🔴 ACTIVE BLOCKING GATE | **Enforcement Level**: SYSTEM-CRITICAL | **Version**: 1.0

### Auto-Enforcement Mechanism (Step 0 - Runs Every Prompt)

**What It Does**:
Each agent's first step (ALWAYS Step 0) validates previous prompt compliance:
1. **Check /updateprompt Logged**: Verify previous prompt entry in `prompts_log.yaml`
   - If MISSING: Log ERROR - "PROTOCOL VIOLATION: /updateprompt not executed in Prompt N-1"
   - Action: HALT work, log to prompts_log.yaml, continue only on next prompt
2. **Check ask_questions() Usage**: Verify all user decisions used ask_questions()
   - If text question found: Log ERROR - "PROTOCOL VIOLATION: Text question instead of ask_questions()"
   - Action: /updateprompt → /chathandoff → close session (user never sees text question)
3. **Proceed Only If Both Pass**: Work can continue only after validation passes

**This Is Not Optional**: Agents cannot bypass this gate. It runs automatically at prompt start.

**Logs To**: `prompts_log.yaml` with timestamp and violation details

