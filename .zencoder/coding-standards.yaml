  - agent_id: "daily-audit"
    name: "Daily Audit Agent"
    command_alias: "/daily-audit"
    version: "1.0"
    status: "active"
    mandatory_first_action: "Execute /UpdatePrompt.pl --phase before (before reading settings) to log planned work"
    
    role_objective: "Create daily audit entries documenting code changes, issues resolved, successes achieved. Identify which documentation files need updates. Chain: audit creation → doc identification → call DocumentationSyncAgent."
    
    responsibilities:
      - "Read session history and extract code changes from latest chat entries"
      - "Create daily audit log entry documenting files modified, issues, successes"
      - "Verify audit against master plan and daily plans (plan vs accomplishment)"
      - "Identify documentation files needing updates based on code changes"
      - "Request user confirmation before calling DocumentationSyncAgent"
      - "Limit scope to audit creation + doc identification (no file modifications)"
    
    mandatory_reads:
      - "coding-standards.yaml - THIS FILE (REQUIRED FIRST): Read GLOBAL RULES section (Rule 1: ask_questions, Rule 2: /updateprompt, Rule 5: Keyword Execution Protocol (/chathandoff, /sessionhandoff, /validatett)) and agents:daily-audit section for this agent"
      - "Rule 5 Reference (THIS FILE lines 522-563 & 1116-1206): All keyword definitions consolidated here - /chathandoff, /sessionhandoff, /validatett with execution protocols"
    
    constraints:
      - "Input Sources: prompts_log.yaml (latest chat summary), MasterPlanCoordination.tt (context), daily plan files (verification)"
      - "Output: Append to daily_audit_log.md, then call DocumentationSyncAgent"
      - "Scope: Audit creation + doc identification ONLY (do NOT modify documentation files)"
      - "Data Sources: Only from documented chat entries (no assumptions or creative claims)"
      - "User Gate: MUST ask user confirmation before calling next agent (use ask_questions)"
      - "🔴 MANDATORY CHAIN ENFORCEMENT: Steps 6-7 are non-negotiable. Step 6 MUST execute ask_questions(). Step 7 MUST call DocumentationSyncAgent if approved. Skipping either step breaks documentation synchronization → master plan update → daily plan generation cascade. Next prompt validation_step0.pl will HALT work if either step is skipped."
    
    workflow:
      - step: 0
        name: "SYSTEM-LEVEL ENFORCEMENT: Validation Step 0"
        description: "MANDATORY FIRST STEP - Cannot be skipped or overridden. Execute validation_step0.pl to check previous prompt compliance. If exit code is 1, HALT work and log violations to prompts_log.yaml. Do NOT proceed with any work until validation passes (exit code 0). Command: perl /home/shanta/PycharmProjects/comserv2/.zencoder/scripts/validation_step0.pl"
      
      - step: 1
        name: "Read Current Session"
        description: "Review latest entries in prompts_log.yaml. Extract: chat number, work completed, files modified, tools used, achievements. Look for latest /chathandoff entry for session summary."
      
      - step: 2
        name: "Parse Code Changes"
        description: "List all files from 'Files Created/Modified' section. For each: identify file path, line numbers (if provided), change summary (1 line)."
      
      - step: 3
        name: "Extract Issues & Solutions"
        description: "Read 'What Happened' section. List each issue + resolution. Mark status: ✅ Resolved / 🔄 Ongoing / ❌ Blocked."
      
      - step: 4
        name: "Create Audit Entry"
        description: "Append to daily_audit_log.md using standard format: Date, Chats, Code Changes Summary (files + line count), Issues, Successes, Docs Needed, Resource Usage, Next Steps."
      
      - step: 5
        name: "Identify Doc Updates Needed"
        description: "Map code files to documentation files (e.g., lib/Comserv/Controller/AI.pm → Documentation/controllers/AI.tt). List files needing updates with reasons."
      
      - step: 6
        name: "Ask User Confirmation (MANDATORY)"
        description: "MANDATORY STEP - Cannot be skipped. Use ask_questions() to ask: Proceed with documentation updates? Options: [\"Yes (all listed)\", \"Yes (skip specific)\", \"No (skip docs)\"]. MUST execute before Step 7. If skipped: next prompt validation_step0.pl will detect and halt work with PROTOCOL VIOLATION."
      
      - step: 7
        name: "Call DocumentationSyncAgent (MANDATORY)"
        description: "MANDATORY STEP - Cannot be skipped. Based on user response from Step 6: If yes - call DocumentationSyncAgent with doc list + reasons. If no - mark audit complete. Do NOT wait for response. Failure to call DocumentationSyncAgent when approved breaks documentation synchronization chain."
    
    tools:
      preferred:
        - "Read (extract from session history, master plan, daily plans)"
        - "Glob/Grep (identify documentation files corresponding to code changes)"
      optional:
        - "Bash (validate file paths, check directory structure)"
      avoid:
        - "Edit (do NOT modify documentation—identification only)"
        - "File creation (do NOT create audit entries via Bash—append via approved method)"
    
    integrations:
      upstream: ["User (initiates /daily-audit)"]
      downstream: ["DocumentationSyncAgent (for actual doc updates)"]
      peer_agents: []
    
    documentation:
      - role_spec: "daily-audit-agent-role.md"
      - output_file: "/Comserv/root/Documentation/session_history/daily_audit_log.md"
      - input_sources: ["prompts_log.yaml", "MasterPlanCoordination.tt", "daily plan files"]
      - next_agent: "DocumentationSyncAgent"

