      - step: "6-EXTENSION"
        name: "Validate After Updates"
        description: "After each update: Check META syntax valid, PageVersion line valid, HTML/TT syntax correct, no broken links. Read file back to confirm."
      
      - step: "7-EXTENSION"
        name: "Summarize Updates"
        description: "Create summary: date, source (daily audit chat number), files updated (with version transitions), total files count. Track version increments."
      
      - step: "8-EXTENSION"
        name: "Call Master Plan Updater"
        description: "Pass to /update-master-plan: Audit date, chats, code files modified count, docs updated list, issues/successes, next steps. Do NOT wait for response."
    
    tools:
