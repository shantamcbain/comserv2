## Documentation Link Standards (MANDATORY FOR ALL AGENTS)

**Authoritative Source**: This section (coding-standards.yaml Documentation Link Standards)  
**Scope**: All links in `.tt` files under `/Comserv/root/Documentation/`  
**Status**: 🔴 CRITICAL - Enforced for all documentation agents

### The Core Rule (Non-Negotiable)

**ALL documentation links MUST follow this format**:

```
/Documentation/FILENAME
```

**NOT**:
- ❌ `/Documentation/FILENAME.tt` (DO NOT include .tt extension)
- ❌ `/Documentation/subdirectory/FILENAME` (DO NOT include subdirectory)
- ❌ `/Documentation/system/FILENAME.tt` (DO NOT mix both errors)

### How It Works

The Comserv documentation controller uses a **flat namespace**:
1. **Scans all files recursively** in `/Documentation/` and subdirectories
2. **Extracts filename without extension** as the routing key
3. **Ignores subdirectories** in URL - only uses base filename
4. **Routes via `/Documentation/KEY`** where KEY = filename without .tt extension

### Quick Reference Examples

| File Location | Correct Link | ❌ Wrong Format |
|---|---|---|
| `root/Documentation/Root.tt` | `/Documentation/Root` | `/Documentation/root.tt` |
| `root/Documentation/models/User.tt` | `/Documentation/User` | `/Documentation/models/User.tt` |
| `root/Documentation/CloudflareIntegration.tt` | `/Documentation/CloudflareIntegration` | `/Documentation/cloudflareintegration` |

### Validation

Use `/validatett` keyword to verify link validity:
- Scans all links in `.tt` file
- Verifies target files exist
- Reports broken links with line numbers
- Suggests correct format for malformed links

### Exception: Non-Documentation Links

For pages **outside** `/Documentation/`:

| Target | Format |
|---|---|
| Admin interface | `/admin` |
| Home page | `/` or `/index` |
| Todo app | `/todo` |
| Projects | `/projects` |

### Agent Responsibility

- ✅ Use `/Documentation/FILENAME` format for all doc links (PascalCase: Root, User, Project, etc.)
- ✅ NO .tt extension in URLs
- ✅ NO subdirectory prefix in URLs
- ✅ NO hyphens, underscores, or lowercase in filenames (use PascalCase only)
- ✅ Validate with `/validatett` after creating/editing .tt files
- ❌ NEVER hardcode subdirectories, extensions, or lowercase formats

