### Rule 7: Bilateral Audit Trail (Mandatory User + Agent Logging)

**Status**: ✅ Active  
**Enforcement**: 🔴 CRITICAL - Non-negotiable session integrity requirement  
**Consolidated Source**: This section (Rule 7) contains all bilateral logging standards  
**Effective**: 2026-01-06 (formalized after Chat 26 incident where one-sided logging broke workflow)

**THE RULE (Non-Negotiable)**:
- ❌ FORBIDDEN: Logging ONLY agent actions without user prompts
- ❌ FORBIDDEN: Recording agent summary without original user text
- ✅ REQUIRED: BOTH sides recorded in EVERY prompts_log.yaml entry
  - **USER side**: Exact user prompt text + user action/decision
  - **AGENT side**: What agent actually did + detailed results

**Mandatory Entry Format** (Per /updateprompt Script):

```yaml
---
timestamp: "ISO8601_datetime"
ai_assistant: "Zencoder"
agent_name: "AgentName"
action: "[USER PROMPT TEXT] → [Agent Action]"
description: |
  USER PROMPT: [EXACT TEXT of user's request, verbatim, in quotes]
  USER CONTEXT: [What user asked for, original intent, any decisions made]
  AGENT ACTION: [What agent actually did: files modified, scripts run, tools executed]
  AGENT RESULT: [Outcome: success/failure, changes made, verification performed]
files_involved: ["file1.pm", "file2.yaml"]
code_changed: "[diffs showing exact modifications]"
tools_used: ["Read", "Edit", "Bash"]
success: true/false
problems: null/["description if issues occurred"]
notes: "Any additional context linking user intent to agent execution"
```

**Critical Requirements**:

1. **USER PROMPT Section (ALWAYS FIRST)**:
   - Start with `USER PROMPT: '[exact text]'`
   - Include verbatim user wording in quotes
   - Purpose: Audit trail shows what user ACTUALLY said, not paraphrases
   - Example ✅: `USER PROMPT: 'Fix the database connection bug'`
   - Example ❌: `Received request to fix database issue`

2. **AGENT ACTION Section (ALWAYS SECOND)**:
   - Document what agent actually executed
   - Include file operations, script runs, tool calls
   - Show verification steps performed
   - Example: `AGENT ACTION: Read logs → Identified line 67 error → Applied fix via Edit → Verified with Read`

3. **No Interpretation Gap**:
   - Never paraphrase user intent in agent description
   - Never omit user prompt because "agent knows what was asked"
   - Never summarize action as different from what user requested
   - Missing user prompt = broken audit trail = unrecoverable context

**Why This Matters**:
- Audit trail is LEGAL record of work performed
- One-sided logging (Chat 26 incident): Prompts 95-104 had ZERO user context
- Result: Next agent couldn't verify what user asked, had to ask again (5x repetition)
- Token waste, context loss, session degradation all preventable with bilateral logging
- Forensic analysis requires BOTH sides to understand decision chains

**Execution Sequence** (When Logging to prompts_log.yaml):

```bash
# PHASE 1: BEFORE WORK (log user intent)
perl UpdatePrompt.pl \
  --action "USER PROMPT: '[exact user text]' → Planning [what will be done]" \
  --description "USER PROMPT: '[EXACT TEXT]'. User requested: [parse user intent]. Agent will: [steps planned]" \
  --phase "before" \
  --success 0

# PHASE 2: AFTER WORK (log agent results)
perl UpdatePrompt.pl \
  --action "[User request] → [What agent did]" \
  --description "USER PROMPT: '[from PHASE 1]'. AGENT ACTION: [executed steps]. RESULT: [outcome]. FILES: [list]" \
  --phase "after" \
  --diffs "[exact diffs]" \
  --success 1

# PHASE 3: AFTER ASKING (log user decision)
perl UpdatePrompt.pl \
  --action "User decision: '[SELECTED OPTION]'" \
  --description "USER RESPONSE: '[EXACT TEXT user said]'. Decision: [what they chose]. AGENT ACTION: [next step based on response]" \
  --phase "after" \
  --success 1
```

**VIOLATION PENALTIES (Rule 7 Enforcement)**:
- **First Violation** (One-sided logging attempted):
  - IMMEDIATE: Log to prompts_log.yaml with "VIOLATION: Bilateral logging incomplete"
  - Identify missing side (user prompt or agent action)
  - Re-execute /updateprompt with BOTH sides complete
  - Document what was missing and correction made
- **Second Violation** (Same chat):
  - Log escalation: "REPEATED BILATERAL LOGGING VIOLATION"
  - Execute /chathandoff immediately
  - Session ends with violation flag  
- **Repeated Violations** (3+ across sessions):
  - Escalated to human review
  - Audit trail analysis required
  - Agent role review may result in suspension

**Verification** (How to Detect Violations):
- Check each entry in prompts_log.yaml
- Line 1: Does description contain `USER PROMPT:` or `USER RESPONSE:` or `USER DECISION:`? ✅ If yes → User side present
- Line 2+: Does it contain action description or what agent did? ✅ If yes → Agent side present
- Both missing = violation = fix immediately

**Self-Detection Recovery**:
If agent realizes bilateral logging was incomplete:
1. Identify which side is missing (user prompt or agent action)
2. IMMEDIATELY execute /updateprompt with missing side added
3. Reference the incomplete entry number
4. Explain what was missing and why it matters
5. Continue work only after bilateral entry complete

