      - "Output Files: /Comserv/root/Documentation/DailyPlans/DailyPlansYYYY-MM-DD.tt format, e.g., DailyPlans2026-01-07.tt (7 files for FUTURE days PLUS 1 file for TODAY)"
      - "Date Range: Always creates plans for NEXT 7 days (not past days) BUT ALSO UPDATES TODAY's plan file"
      - "🔴 MANDATORY TODAY UPDATE: After creating future plans, MUST update DailyPlansYYYY-MM-DD.tt where YYYY-MM-DD is today's date (e.g., DailyPlans2026-01-07.tt). Add 'TODAY'S COMPLETION SUMMARY' section showing planned vs. accomplished vs. deferred tasks. This is CRITICAL for keeping team informed of plan changes."
      - "Format: MUST use DocumentationTtTemplate.tt as structural base"
      - "Content from: Extract priorities and timeline from master plan ONLY (no independent planning)"
      - "Verification: Read each file back after creation to validate syntax"
      - "Resource-heavy: Large .tt files may require /chathandoff checkpoint"
      - "Chain position: FINAL STEP in daily workflow (Audit → DocSync → MasterPlan → DailyPlans → [user decides on /chathandoff])"
    
    workflow:
      - step: 0
        name: "SYSTEM-LEVEL ENFORCEMENT: Validation Step 0"
        description: "MANDATORY FIRST STEP - Cannot be skipped or overridden. Execute validation_step0.pl to check previous prompt compliance. If exit code is 1, HALT work and log violations to prompts_log.yaml. Do NOT proceed with any work until validation passes (exit code 0). Command: perl /home/shanta/PycharmProjects/comserv2/.zencoder/scripts/validation_step0.pl"
      
      - step: 1
        name: "Read Master Plan"
        description: "Open /Comserv/root/Documentation/MasterPlanCoordination.tt. Extract: current priorities (Priority Matrix section), active plans (All Plans Inventory), blockers (Dependency Map), resource status, next steps. Note: What are the TOP 3-5 priorities for next 7 days?"
      
      - step: 2
        name: "Review Last 7 Days Execution"
        description: "Read previous DailyPlansYYYY-MM-DD.tt format files (last 7 days). Extract: planned vs accomplished, completion rate, recurring tasks, patterns. Example: Were todos consistently completed? Were estimated times accurate?"
      
      - step: 3
        name: "Calculate Date Range"
        description: "Determine next 7 days: Tomorrow = Day 1. Examples: If today is Dec 31, plans are Jan 1-7. If today is Jan 2, plans are Jan 3-9. Format dates as YYYY-MM-DD."
      
      - step: 4
        name: "Map Master Plan to Daily Work"
        description: "For each TOP PRIORITY from master plan: (1) Break into daily sub-tasks (2) Estimate effort per day (3) Identify dependencies/blockers (4) Assign to specific dates. Example: 'E.1 AI Chat Phase 3' → Day 1: widget testing, Day 2: validation, Day 3: docs."
      
      - step: 5
        name: "Distribute Across 7 Days"
        description: "Balance workload: Don't overload Day 1; leave capacity for unexpected work. Sequence dependent tasks (X must complete before Y). Example: Mon (planning), Tue-Thu (implementation), Fri (testing), Sat-Sun (optional buffer)."
      
      - step: 6
        name: "Create Daily Plan Files"
        description: "For each day (Day 1-7): (1) Create or update DailyPlansYYYY-MM-DD.tt (e.g., DailyPlans2026-01-07.tt) (2) Use DocumentationTtTemplate.tt as base structure (3) Add META block (title, description, page_version) (4) Add Overview section (context, objectives) (5) List Priority 1-3 tasks with time estimates (6) Add success criteria. If file exists, APPEND new chat checklist instead of replacing."
      
      - step: 6.5
        name: "🔴 MANDATORY: Update TODAY's Plan File"
        description: "CRITICAL REQUIREMENT: After creating future plans (Day 1-7), ALWAYS update DailyPlansYYYY-MM-DD.tt where YYYY-MM-DD is TODAY's actual calendar date (e.g., DailyPlans2026-01-07.tt). Add section titled 'TODAY'S COMPLETION SUMMARY' showing: (1) What was PLANNED for today, (2) What was ACTUALLY ACCOMPLISHED today (e.g., 'Daily Plans Generator created 7-day plans', 'Master Plan updated', etc.), (3) What was deferred/not completed. This ensures all team members see current plan status + what changed when daily plans are regenerated. FAILURE TO UPDATE TODAY'S PLAN = FAILURE OF THIS AGENT."
      
      - step: 7
        name: "Verify Syntax"
        description: "After creating each DailyPlansYYYY-MM-DD.tt file: (1) Read file back (2) Check: META block valid, HTML tags balanced, TT syntax correct (3) No broken links to other documentation (4) All dates formatted consistently. Report any syntax errors."
      
      - step: 8
        name: "Offer /chathandoff as User Option"
        description: "After all 7 daily plans created/updated and verified: Use ask_questions() to offer /chathandoff to user. Include note in ask_questions: 'Generated 7-day daily plans (YYYY-MM-DD to YYYY-MM-DD) from master plan priorities. Ready for execution.' Include /chathandoff as one of the user-selectable options in ask_questions()."
    
    tools:
      preferred:
        - "Read (extract master plan priorities, review previous daily plans)"
        - "Edit/Write (create/update DailyPlansYYYY-MM-DD.tt format files)"
        - "Glob (find previous daily plan files)"
      optional:
        - "Bash (date calculations, file validation)"
      avoid:
        - "File deletion (only create/update, never remove daily plans)"
    
    integrations:
      upstream: ["Master Plan Updater Agent (provides updated master plan)"]
      downstream: ["User (ready for daily execution)"]
      peer_agents: ["Daily Audit Agent (context only - for understanding what was accomplished)"]
    
    documentation:
      - agent_spec: "This definition in coding-standards.yaml"
      - output_files: "/Comserv/root/Documentation/DailyPlans/DailyPlansYYYY-MM-DD.tt format, e.g., DailyPlans2026-01-07.tt (7 files per execution)"
      - input_source: "MasterPlanCoordination.tt (from Master Plan Updater Agent)"
      - next_step: "ask_questions() with /chathandoff as user-selectable option (step 8 of workflow)"

