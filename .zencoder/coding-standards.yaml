## KEYWORDS (Consolidated from 4 .md Files)

### Active Keywords

#### /chathandoff - Chat Tracking Within Session

**Format**: 
- `/chathandoff`
- `/chathandoff note: [text]`

**Purpose**: Signal the end of the current chat and record final state as the 'action' in prompts_log.yaml.

**Scope**:
- Finalises current chat session for handoff to next session.
- Adds the keyword `/chathandoff` as the **action** parameter in the last execution of `UpdatePrompt.pl`.
- Example: `perl UpdatePrompt.pl --action "/chathandoff: [brief summary]" --description "USER PROMPT: [text]. Agent action: [text]. Achievements: [text]. Next steps: [text]." --phase "after" --success 1`

**When to Execute**:
- End of chat when significant work is completed or prompt limit (18) is approaching.
- When explicitly requested by the user or required by agent workflow.

**Execution**:
- Add to the final `UpdatePrompt.pl` call for the session.
- Immediate execution - NO QUESTIONS.
- After logging, agent MUST stop and wait for next chat.

---

#### /sessionhandoff - Session Archival

**Format**: `/sessionhandoff`

**Purpose**: Mark current session as archived in prompts_log.yaml when chat completes major milestones

**Execution**:
- Execute /updateprompt with action indicating session completion
- Log final state to prompts_log.yaml with timestamp
- Document work summary, achievements, and next steps for incoming session

**Example**:
```bash
perl .zencoder/scripts/UpdatePrompt.pl \
  --action "Session Archive: Chat X completed" \
  --description "Session completed with X files modified, Y tasks completed. Key achievements: [list]. Ready for next chat/session." \
  --phase "after" \
  --files "[list of final files]" \
  --success 1
```

---

#### /validatett - Template Toolkit Validation

**Format**:
- `/validatett filename.tt` (single file)
- `/validatett filename.tt doctype` (specify: application or documentation)
- `/validatett` (batch validate current directory)

**Purpose**: Validate .tt files against appropriate templates for META, PageVersion, and theme compliance

**Status**: NOT YET TESTED - Needs verification

