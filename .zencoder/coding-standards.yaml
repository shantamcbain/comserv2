## AGENT DATA FLOW SPECIFICATIONS (TUNING for Sequential Execution)

**Purpose**: Define exact data format and location for agent-to-agent communication. Each agent's OUTPUT must match next agent's INPUT specification.

### Data Flow Chain:
```
Daily Audit Agent → DocumentationSyncAgent → Master Plan Updater → Daily Plans Generator
```

### File-Based Data Passing Mechanism

**Location**: `/Comserv/root/Documentation/session_history/agent_pipeline_data.yaml`  
**Format**: YAML structured file updated by each agent in sequence  
**Purpose**: Single source of truth for passing audit results, documentation updates, and plan changes through the pipeline

#### Daily Audit Agent Output (writes to agent_pipeline_data.yaml):
```yaml
audit_session:
  chat: <current_chat_number>
  timestamp: <ISO8601_datetime>
  status: "completed"
data:
  audit_date: "YYYY-MM-DD"
  files_modified: <count>
  files_list: ["file1.pm", "file2.tt", ...]
  docs_needing_update: ["Doc1.tt", "Doc2.tt", ...]
  docs_update_reasons: {"Doc1.tt": "Reflects AI.pm changes", ...}
  code_changes_summary: "X lines added/modified, Y deleted"
  issues_resolved: ["Issue1", ...]
  successes: ["Success1", ...]
  next_agent: "DocumentationSyncAgent"
```

#### DocumentationSyncAgent Input (reads from agent_pipeline_data.yaml):
- **What to read**: `data.docs_needing_update` (file list) + `data.docs_update_reasons` (context)
- **What to use**: `data.audit_date`, `data.code_changes_summary`, `audit_session.chat`

#### DocumentationSyncAgent Output (appends to agent_pipeline_data.yaml):
```yaml
  documentation_sync:
    docs_updated: ["Doc1.tt (v1.01→v1.02)", "Doc2.tt (v1.00→v1.01)", ...]
    docs_update_count: <count>
    versions_incremented: {"Doc1.tt": "v1.01→v1.02", ...}
    format_violations_fixed: <count>
    validation_results: "✅ All .tt files valid"
    issues_found: [...]
    successes: [...]
    next_agent: "Master Plan Updater"
```

#### Master Plan Updater Input (reads from agent_pipeline_data.yaml):
- **What to read**: `data.*` (code changes, summary) + `documentation_sync.*` (docs updated, versions)
- **What to produce**: Update MasterPlanCoordination.tt with audit results

#### Master Plan Updater Output (appends to agent_pipeline_data.yaml):
```yaml
  master_plan_update:
    plan_version_old: "X.XX"
    plan_version_new: "X.XX+1"
    timestamp: <ISO8601>
    top_10_reranked: ["Initiative1", ...]
    timeline_adjustments: {...}
    next_agent: "Daily Plans Generator"
```

#### Daily Plans Generator Input (reads from agent_pipeline_data.yaml):
- **What to read**: `master_plan_update.*` (updated plan version/priorities)
- **What to produce**: Create/update DailyPlansYYYY-MM-DD.tt format files for today + 7 days (e.g., DailyPlans2026-01-07.tt)

### Agent Tuning Verification Checklist

Before each agent executes, it MUST:
1. ✅ **Read agent_pipeline_data.yaml** to verify previous agent completed (check `next_agent` field matches current agent name)
2. ✅ **Extract required fields** for this agent's step (e.g., DocumentationSyncAgent reads `data.docs_needing_update`)
3. ✅ **Update agent_pipeline_data.yaml** AFTER completing work (append new section with this agent's output)
4. ✅ **Set next_agent field** to name of next agent in chain
5. ✅ **Log /updateprompt** with reference to agent_pipeline_data.yaml update (--diffs parameter)

### How This Fixes the Workflow

**Before (Broken)**:
- Daily Audit Agent says "call DocumentationSyncAgent with doc list" → **No defined mechanism**
- DocumentationSyncAgent says "Extract from /daily-audit" → **Doesn't know WHERE**
- Master Plan Updater says "Receive from DocumentationSyncAgent" → **Doesn't know WHAT format**

**After (Fixed)**:
- Daily Audit Agent writes `data.docs_needing_update` to `agent_pipeline_data.yaml` → /updateprompt logs this
- DocumentationSyncAgent reads `agent_pipeline_data.yaml`, confirms `next_agent: "DocumentationSyncAgent"` → Proceeds with known data
- DocumentationSyncAgent writes `documentation_sync` section to same file → /updateprompt logs this
- Master Plan Updater reads entire file, finds both `data` and `documentation_sync` sections → Has all context needed
- Master Plan Updater writes `master_plan_update` section → /updateprompt logs this
- Daily Plans Generator reads final file with all accumulated data → Generates plans from complete context

