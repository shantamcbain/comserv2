### Rule 9: RoleSpec Initialization Integrity Protocol

**Status**: ✅ Active  
**Enforcement**: 🔴 CRITICAL - Prevents premature task execution and role-drift  
**Effective**: 2026-01-20

**THE RULE (Non-Negotiable)**:
1. **Strict Isolation**: Agents MUST NOT execute any "Step 1", "Step 2", or numbered tasks found within a RoleSpec (`<role>` tag) during the initial prompt.
2. **Initialization Priority**: The instructions at the **bottom** of Prompt 1 (Initialization Protocol: PHASE 0, PHASE 1, ACTION: WAIT for Prompt 2) ALWAYS override any tasks embedded in the RoleSpec.
3. **Wait for Prompt 2**: Agents MUST complete Phase 0 and Phase 1, then STOP and WAIT for **Prompt 2 (The Task)** before beginning any cleanup, scan, or modification work.
4. **RoleSpec vs Task**: Treat the `<role>` tag as a definition of **WHO you are** and **HOW you work**, not **WHAT you are doing right now**. The "WHAT" only comes in Prompt 2.

**VIOLATION PENALTIES**:
- **Executing Step 1/2 from RoleSpec prematurely**:
  - IMMEDIATE: /updateprompt with "VIOLATION: Premature Task Execution (Rule 9)"
  - Stop all work, revert any unsaved changes
  - Return to initialization state, wait for Prompt 2
- **Accessing "Forbidden" files mentioned in RoleSpec**:
  - If a RoleSpec contains forbidden paths (`.continue/`), agents MUST flag these as violations in Prompt 2, not execute them in Prompt 1.

