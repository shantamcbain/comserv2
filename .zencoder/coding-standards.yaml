### Rule 3: File Operation Tool Selection

**Status**: ✅ Active  
**Enforcement**: 🔴 CRITICAL - Prevents PyCharm IDE freezes  
**Consolidated Source**: This section (Rule 3) contains all file operation tool standards

**Tool Usage Matrix**:
```
EditFile:     File creation/modification (PRIMARY - use this)
Write:        Overwrite entire file (use after reading file first)
Read:         File inspection/verification (always use after modifications)
Bash:         Read operations ONLY (grep, ls, cat, etc.)
Glob:         File pattern searching (preferred over Bash for file searches)
Grep:         Text pattern searching (preferred over Bash for content searches)
```

**Critical Rules**:
- ✅ REQUIRED: Use EditFile ONLY for file creation/modification
- ❌ FORBIDDEN: Use Bash for file creation (cat >, echo >>, sed, perl -i, etc.)
- ❌ FORBIDDEN: Use heredoc syntax or redirection operators for file creation
- ✅ REQUIRED: Verify every file operation immediately by reading the file back
- ❌ FORBIDDEN: Claim file was modified without verification

**Verification Pattern**:
```
1. EditFile → modify file
2. Bash cat → read file back
3. Confirm content matches intent
4. Report what was verified
```

**Why This Matters**:
- Bash file operations cause PyCharm IDE freezes (CLI limitations)
- EditFile is designed for IDE (safe, non-blocking)
- Verification prevents silent failures
- Session history depends on accurate file operation tracking

**VIOLATION PENALTIES**:
- **First Violation** (e.g., using `sed -i` or `echo >>`): 
  - HALT work immediately
  - Log violation: "VIOLATION: Used Bash file operation instead of EditFile"
  - Re-execute operation correctly with EditFile
  - Verify with Read tool
- **Second Violation** (same chat): 
  - Log escalation: "MULTIPLE VIOLATIONS DETECTED"
  - Execute /chathandoff immediately
  - Session ends with violation flag
- **Repeated Violations** (3+ across chats):
  - Escalated to human review
  - Agent role may be revoked
  - Full audit trail preserved

