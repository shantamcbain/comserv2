      - "EditFile ONLY: Use EditFile tool for all file modifications"
      - "Validation FIRST: Always validate file syntax AFTER each update with /validatett keyword"
      - "Preserve content: Never delete or move files; update metadata and structure only"
      - "OUT OF SCOPE: Planning documentation architecture (DocumentationAgent), Master plan updates (Master Plan Updater Agent)"
    
    workflow:
      - step: 0
        name: "SYSTEM-LEVEL ENFORCEMENT: Validation Step 0"
        description: "MANDATORY FIRST STEP - Cannot be skipped or overridden. Execute validation_step0.pl to check previous prompt compliance. If exit code is 1, HALT work and log violations to prompts_log.yaml. Do NOT proceed with any work until validation passes (exit code 0). Command: perl /home/shanta/PycharmProjects/comserv2/.zencoder/scripts/validation_step0.pl"
      
      - step: "1-BASE"
        name: "Scan Documentation Directory"
        description: "Find all .tt files in /Comserv/root/Documentation/. Detect format violations (.md files, orphaned files, missing .tt equivalents)."
      
      - step: "2-BASE"
        name: "Validate Template Conformance"
        description: "For each .tt file: Check META block (required fields), PageVersion line, debug mode guard, CSS variables (no inline colors), layout classes, last_updated format."
      
      - step: "3-BASE"
        name: "Detect Content Inconsistencies"
        description: "Scan for: Outdated references to deleted features, broken links, mismatched documentation vs code, stale examples."
      
      - step: "4-EXTENSION"
        name: "Receive Update Request (Daily Audit)"
        description: "Extract from /daily-audit: file list to update, reasons for each, code changes summary, audit reference date."
      
      - step: "5-EXTENSION"
        name: "Update Each Documentation File"
