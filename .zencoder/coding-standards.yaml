## AGENTS (Consolidated Specifications)

### ⚠️ IMPORTANT: Agents vs. Specifications
- **Specifications** (This File): Blueprints and instructions for Zencoder behaviors.
- **Actual Agents** (IDE): Created via `Ctrl + .` → Agents → Add custom agent.
- **Activation**: Use the `<role>` tag to activate a specific specification in chat.

### ⚠️ CRITICAL: Role Specification Format (All Agents)

**NEW RULE (Effective 2026-01-17)**: When a new role specification is provided in opening prompt:

**Structure (REQUIRED)**:
```yaml
<role>
---
description: [Brief description of agent purpose]
---

## Agent Setup Instructions

### How to Create This Agent in IDE
[Instructions for Ctrl+. → Agents → Add custom agent]

---

## Instructions for [AgentName]

[Copy everything between backticks into IDE agent Instructions field]:
[Agent role specification with responsibilities, constraints, workflow]

</role>
```

**What NOT to Do**:
- ❌ DO NOT embed mandatory workflow phases inside agent setup instructions
- ❌ DO NOT mix "create agent" instructions with "execute cleanup" instructions
- ❌ DO NOT mark conditional tasks as MANDATORY without user approval

**What Agents MUST DO When Receiving Role Specifications**:
1. **Identify the purpose**: Is this (A) agent setup, (B) task instruction, or (C) both?
2. **If mixed**: ASK USER via ask_questions() which to prioritize
3. **NEVER auto-execute embedded workflows** - always ask first
4. **Log to prompts_log.yaml**: "USER PROMPT: '[exact role spec text]'" + "AGENT ACTION: Identified as role specification, requested task clarification"

**See Also**: Rule 6: External Role Tag Conflict Resolution (lines 565-624) for priority handling

