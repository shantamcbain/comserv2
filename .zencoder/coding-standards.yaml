### Rule 2: /updateprompt Workflow Gate (Three-Phase Protocol)

**Status**: ✅ Active  
**Enforcement**: 🔴 CRITICAL - Required workflow sequence for every prompt  
**Consolidated Source**: This section (Rule 2) contains all /updateprompt workflow requirements

**IMPORTANT CLARIFICATION**:
- `/updateprompt` is NOT a keyword
- `/UpdatePrompt.pl` is a Perl SCRIPT agents MUST EXECUTE at specific phases (not text output)
- The text `[/updateprompt executed]` is documentation/communication, not the actual execution
- Text alone causes lockup; script execution logs to YAML
- **NEW**: Three separate executions per prompt (before, after work, after asking)

**⚠️ BILATERAL LOGGING REQUIREMENT (RULE 7 ENFORCEMENT)**:
- **MANDATORY**: EVERY /updateprompt execution MUST record BOTH user AND agent perspectives
- **USER SIDE**: Must always include verbatim user prompt text (`USER PROMPT: '[exact text]'`) or user decision (`USER RESPONSE: '[exact text]'`)
- **AGENT SIDE**: Must always include what agent actually did and results achieved
- **VIOLATION**: One-sided logging (e.g., agent action without user prompt) or paraphrasing the user prompt is recorded as bilateral logging violation per Rule 7.
- **See Rule 7** (THIS FILE, lines 626-744) for complete bilateral logging standards and enforcement penalties

**FAILURE PATTERNS TO AVOID**:
1. **Reading Outdated Files**: NEVER read archived .md or .tt files if `prompts_log.yaml` is available.
2. **Paraphrasing User Prompts**: ALWAYS use `USER PROMPT: [verbatim text]` in the `--description` field.
3. **Combining Prompts**: NEVER execute Prompt 2 tasks before Prompt 1 setup (Phase 0/1) is verified.

**Mandatory Workflow Sequence** (MUST follow in order):

#### PHASE 1: BEFORE EXECUTING WORK
```bash
perl /home/shanta/PycharmProjects/comserv2/.zencoder/scripts/UpdatePrompt.pl \
  --action "Brief description of what WILL be done" \
  --description "USER PROMPT: [EXACT TEXT OF USER'S INPUT]. Detailed explanation of planned action, what questions were asked, user responses" \
  --phase "before" \
  --files "file1.pm, file2.yaml" \
  --tools "Read, Edit, Bash" \
  --success 0 \
  --notes "Logging before execution to create audit trail"
```

**CRITICAL**: --description MUST START with `USER PROMPT: [exact text]` so audit trail shows what user actually said, not agent interpretations. Example:
```
--description "USER PROMPT: 'Fix database bug'. Agent planned: (1) Read database logs, (2) Identify error, (3) Apply fix. Tools: Read, Bash. No questions asked yet."
```

#### PHASE 2: AFTER WORK COMPLETES
```bash
perl /home/shanta/PycharmProjects/comserv2/.zencoder/scripts/UpdatePrompt.pl \
  --action "Brief description of what was actually done" \
  --description "Detailed explanation of actual work completed" \
  --phase "after" \
  --diffs "File X: [diff showing changes]\nFile Y: [diff showing changes]" \
  --files "file1.pm, file2.yaml" \
  --tools "Read, Edit, Bash" \
  --problems "Any failures: read timeouts, find issues, permission errors, etc." \
  --success 1 \
  --notes "Logging after execution with results"
```

#### PHASE 3: AFTER ASKING QUESTIONS
When asking_questions() is used, execute after user response arrives:
```bash
perl /home/shanta/PycharmProjects/comserv2/.zencoder/scripts/UpdatePrompt.pl \
  --action "User decision: [option selected]" \
  --description "USER RESPONSE: [exact answer text or selected option]. Explanation: [user's reasoning if provided], next step: [action to take based on response]" \
  --phase "after" \
  --success 1 \
  --notes "Logging user response and next action"
```

**CRITICAL**: When user responds, record EXACT TEXT of their response, not paraphrases. Example:
```
--description "USER RESPONSE: 'YES - Fix the settings now to prevent this recurring'. Next step: Update coding-standards.yaml Rule 2 with clear example."
```

**Execution Sequence Correctness** (STRICT ORDER):
1. ✅ Execute /UpdatePrompt.pl with `--phase before` (log what you PLAN to do)
2. ✅ Do the actual work (read files, execute edits, etc.)
3. ✅ Execute /UpdatePrompt.pl with `--phase after` (log diffs + problems)
4. ✅ Call ask_questions() function with user options
5. ✅ WAIT for user response (do not continue)
6. ✅ On next prompt, execute /UpdatePrompt.pl with phase after (log user decision)

**Script Parameters**:
- `--action`: Brief (1 sentence) action description [REQUIRED]
- `--description`: Detailed explanation [REQUIRED]
- `--phase`: "before" (planning/pre-work) or "after" (post-execution) [REQUIRED]
- `--chat`: Chat number (auto-detected from prompts_log.yaml /chathandoff entries if not provided) [NEW Chat 66]
- `--prompt`: Prompt number (auto-detected from prompts_log.yaml if not provided)
- `--diffs`: Show what changed in files (key for "after" phase) [Recommended for Phase 2]
- `--files`: Comma-separated file list involved [Recommended]
- `--tools`: Comma-separated tool list used [Recommended]
- `--success`: 1 (success) or 0 (failure/violation) [default: 1]
- `--problems`: Description of problems encountered [Use for Phase 2 failures]
- `--notes`: Additional notes about the phase

**Script Output Location**:
- Appends entries to: `/Comserv/root/Documentation/session_history/prompts_log.yaml`
- Auto-detects Chat and Prompt numbers unless overridden
- Success example: `✅ Updated prompts_log.yaml: Chat 6, Prompt 8`

**Recent Fixes**:
- ✅ **Chat 7**: Fixed regex to match both `## Chat N` and `### **Chat N` formats
- ✅ **Chat 7**: Fixed auto-detection to return current chat (first match, not last)
- ✅ **Chat 7**: Added `--help` function with full examples and documentation
- ✅ **Chat 19**: Added `--phase` and `--diffs` parameters for three-phase protocol
- ✅ **Chat 66**: REFACTORED chat auto-detection to use /chathandoff entries from prompts_log.yaml as primary source. New `get_chat_from_handoff()` function scans prompts_log.yaml for latest /chathandoff entry and increments chat number.

**Verification**:
- Always verify execution succeeded: Look for `✅ Updated prompts_log.yaml: Chat X, Prompt Y` message
- Check prompts_log.yaml has 3 entries per prompt (before, after work, after asking)
- If auto-detection fails, manually provide `--chat` parameter
- Tail prompts_log.yaml to confirm entries logged: `tail -30 /Comserv/root/Documentation/session_history/prompts_log.yaml`

**VIOLATION PENALTIES (Rule 2 Enforcement)**:
- **First Violation** (skipping /updateprompt or wrong sequence):
  - HALT work immediately
  - Log violation: "VIOLATION: /UpdatePrompt.pl not executed or wrong phase sequence"
  - Execute /UpdatePrompt.pl immediately with current phase
  - Re-execute /updateprompt for remaining phases
- **Second Violation** (same chat):
  - Log escalation: "MULTIPLE VIOLATIONS - Rule 2"
  - Execute /chathandoff immediately
  - Session ends with VIOLATION flag  
- **Repeated Violations** (3+ across sessions, e.g., Chat 21 violations):
  - Escalated to human review
  - Audit trail shows violation pattern
  - Agent role requires human re-authorization

