# ======================================================================
# SECTION: SESSION MANAGEMENT & HANDOFF PROTOCOLS
# ======================================================================
session_management:
  sources: ["repo.md:336-398"]
  
  session_definition:
    not_daily: "Session is based on **task completion** or **file size threshold**, NOT time"
    session_ends_when:
      - "Major task completed, OR"
      - "current_session.md exceeds 400 lines"
    rationale: "AI performance degrades with file length >400 lines; forcing handoff keeps session history readable"
    multiple_per_day: "Multiple sessions per day are normal and encouraged (timestamp prevents data loss)"
  
  automatic_handoff_triggers:
    prompt_count_5: "Status changes to CAUTION (watch for compaction)"
    prompt_count_8: "Status changes to HANDOFF_RECOMMENDED (execute `/chathandoff` immediately)"
    prompt_count_10: "CRITICAL status - compaction risk HIGH, forced handoff"
    file_size_400: "current_session.md exceeds 400 lines → handoff triggered regardless of prompt count"
    compaction_detected: "If agent feels response is 'too long' → execute `/chathandoff` instead of compacting"
    pattern_anomalies:
      - "Same file checked >2× within 10 minutes → CAUTION status"
      - "Same command executed >2× within 15 minutes → CAUTION status"
      - "Diagnosis reversed without resolution → CAUTION status"
      - "Code modified >3 times without validation → CAUTION status"
    unvalidated_commands: "Unvalidated commands >5 in sequence suggests looping → CAUTION status"
  
  status_levels:
    normal: "✅ NORMAL (0-4 prompts): All tools available"
    caution: "🟡 CAUTION (5-7 prompts): Watch for compaction, handoff recommended"
    handoff_recommended: "🔴 HANDOFF_RECOMMENDED (8+ prompts): Execute `/chathandoff` immediately"
    critical: "🚨 CRITICAL (10+ prompts): Compaction risk HIGH, forced handoff"

session_file_storage:
  sources: ["repo.md:364-403"]
  official_location: "/home/shanta/PycharmProjects/comserv2/Comserv/root/Documentation/session_history/"
  
  what_goes_in_session_history:
    - "✅ Session archives, handoffs, transcripts (dated format)"
    - "✅ ALL .md draft/working files (no .md files in main Documentation/ folder)"
    - "✅ Audit logs and resource tracking files"
    - "✅ Prompt counter state files"
    - "✅ Session management scripts (.pl files)"
    - "✅ Session metadata files (.yaml, .json tracking data)"
  
  what_does_not_go_in_session_history:
    - "❌ Live documentation (.tt files stay in main Documentation/ folder)"
    - "❌ Application code files (.pm, .js, .css)"
    - "❌ Configuration files (except session-specific)"
    - "❌ Zencoder agent rules (.continue/rules/*.md are agent configs - different folder)"
  
  naming_convention:
    format: "YYYY-MM-DD_HH-MM-SS_session_[type].md"
    types: ["handoff", "archive", "transcript", "plan"]
    examples:
      - "2025-10-31_14-30-45_session_handoff.md"
      - "2025-10-31_18-15-22_session_handoff.md"
      - "2025-11-03_17-37-32_session_archive.md"
    rationale_1: "Timestamp ensures each handoff is unique, even with multiple handoffs per day"
    rationale_2: "PREVENTS DATA LOSS: Multiple sessions on same day will NOT overwrite each other"
    rationale_3: "MAINTAINS AUDIT TRAIL: Exact timestamp of when session ended"
    rationale_4: "ENABLES QUICK LOOKUP: Sessions sorted chronologically by filename"

session_format_standards:
  sources: ["repo.md:406-430"]
  mandatory_fields: "[CRITICAL] ALL 7 REQUIRED - DO NOT OMIT"
  fields:
    - "Chat Focus - Brief description of what this chat focused on"
    - "Chat Objective - Specific goal or task this chat aimed to accomplish"
    - "What Happened - Actions taken during chat (2-4 lines minimum)"
    - "Key Achievements - Concrete accomplishments (1-3 items)"
    - "Files Created/Modified - ALL files listed with status markers (✅/❌/⚠️) - NONE HIDDEN"
    - "Current Implementation Status - Progress tracking across chats (3-4 items minimum with ✅/⚠️/❌)"
    - "Resource Usage - Prompt count, tool calls, API quota (auto-generated from `.prompt_counter`)"
  
  minimum_entry_length: "18+ lines per chat entry - MEASURED AND ENFORCED"
  file_accountability: "ALL modified files MUST be listed in 'Files Created/Modified' section"
  status_markers: "✅ (successful), ❌ (failed), ⚠️ (partial)"
  never_hide_files: "NEVER hide files to reduce chat length - file tracking is essential for code audit trail"
  repetition_detection: "Include 'Is This Related to Previous Chat?' field; reference which chat(s) worked on same issue"

resource_usage_tracking:
  sources: ["repo.md:433-483"]
  what_tracked:
    - "Prompt Count: Number of prompts in current chat (from `.prompt_counter`)"
    - "Tool Calls: Commands executed via tools (from `.prompt_counter`)"
    - "API Quota: Zencoder premium calls vs daily limit (cached from API)"
    - "Session Status: Status level (NORMAL/CAUTION/WARNING/CRITICAL)"
  
  cost_categorization:
    file_operations_low_cost: ["ViewFile", "EditFile", "WriteFile", "ListDirectory"]
    search_operations_medium_cost: ["file_search", "fulltext_search"]
    browser_operations_high_cost: ["browser_navigate", "browser_snapshot", "browser_click", "browser_fill_form", "browser_type", "browser_wait_for"]
    shell_operations_low_cost: ["ExecuteShellCommand"]

