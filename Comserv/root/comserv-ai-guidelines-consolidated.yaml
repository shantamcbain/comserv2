# COMSERV AI GUIDELINES - CONSOLIDATED MASTER REFERENCE
# ======================================================================
# Purpose: Single authoritative source for all AI assistant guidelines
# Version: 2.1 CONSOLIDATED (from 6 prior files + wrapping-up loop prevention)
# Updated: 2025-12-06 (Chat 21: Added cleanup-agent-role.md with loop prevention)
# Status: ACTIVE - Primary reference; prior files marked for deprecation
# ======================================================================

# SECTION: PROJECT OVERVIEW
project_overview:
  name: "Comserv - Business Operations Management System"
  language: "Perl 5.40.0"
  runtime: "Perlbrew"
  framework: "Catalyst MVC"
  description: "Multi-tenant web application for project management, documentation, site administration, user management, task tracking, network mapping, database management"
  key_technologies:
    - "Perl 5 + Catalyst MVC"
    - "Template Toolkit (TT) for templating"
    - "DBIx::Class ORM"
    - "MariaDB/MySQL"
    - "Docker/Docker Compose"
    - "Starman PSGI server"
    - "GitHub Actions CI/CD"
    - "Moose OOP"
    - "JSON/YAML configs"
  multi_tenancy: "Sites with custom themes/domains via Site and ThemeConfig models"
  key_modules:
    - "Todo (task tracking)"
    - "User authentication"
    - "Documentation management"
    - "Network mapping"
    - "ENCY (herbal database)"
    - "BMaster (bee apiary tracking)"
    - "Proxmox integration"
    - "Cloudflare integration"
    - "Ollama AI queries"

# ======================================================================
# SECTION: ZENCODER CONFIGURATION DIRECTORIES & MONITORING
# ======================================================================
zencoder_configuration:
  description: "Directories and files monitored/configured by Zencoder for IDE integration, consistency checks, and agent deployment"
  
  primary_zencoder_config_directories:
    zencoder_rules_path: "/.zencoder/rules/"
    zencoder_rules_contents:
      - "repo.md - AUTHORITATIVE Zencoder-specific safety rules and IDE configuration (PRIMARY SOURCE for agents)"
      - "cleanup-agent-workflow.md - Cleanup Agent incremental workflow and loop prevention rules"
      - "cleanup-agent-role.md - Cleanup Agent role specification with mandatory enforcement"
      - "keywords.md - Centralized keyword definitions and execution protocols for all agents"
      - "documentation-synchronization-agent.md - Documentation sync agent procedures and responsibilities"
    zencoder_docs_path: "/.zencoder/docs/"
    zencoder_docs_note: "Reference documentation and Docker build summaries (supplementary, not config)"
  

  monitored_application_source_directories:
    documentation_directory:
      path: "/Comserv/root/Documentation/"
      monitored_by: "DocumentationSyncAgent (daily)"
      file_types: ".tt files ONLY (Template Toolkit format for browser display)"
      purpose: "Live documentation sync, index updates, missing doc detection"
      subdirectories:
        - "controllers/ - Controller-specific documentation"
        - "models/ - Model-specific documentation"
        - "features/ - Feature documentation"
        - "system/ - System-level documentation"
        - "deployment/ - Deployment guides"
        - "operations/ - Operations and integration documentation"
        - "changelog/ - Change logs (YYYY-MM-description.tt format)"
    
    controllers_directory:
      path: "/Comserv/lib/Comserv/Controller/"
      monitored_by: "Zencoder (on-demand)"
      file_types: ".pm files (Perl modules)"
      purpose: "Track controller routes, actions, and parameter changes"
      trigger_action: "When controller modified → Check if /Documentation/controllers/ControllerName.tt exists"
    
    models_directory:
      path: "/Comserv/lib/Comserv/Model/"
      monitored_by: "Zencoder (on-demand)"
      file_types: ".pm files (Perl modules, esp. DBIx::Class schemas)"
      purpose: "Track model changes and schema modifications"
      trigger_action: "When model modified → Check if /Documentation/models/ModelName.tt exists"
    
    config_directory:
      path: "/Comserv/root/"
      monitored_by: "All agents (reference point)"
      key_files:
        - "comserv-ai-guidelines-consolidated.yaml - PRIMARY AUTHORITATIVE SOURCE (this file)"
      purpose: "Central configuration point for all agents"
  
  excluded_directories:
    test_directory:
      path: "/Comserv/t/"
      reason: "Test files not monitored (covered by code agent, not Zencoder)"
    
    script_directory:
      path: "/Comserv/script/"
      reason: "Utility scripts not monitored"
    
    node_modules_and_deps:
      path: "node_modules/, .cpan/, perlbrew/"
      reason: "Dependency directories excluded from monitoring"
  

  synchronized_files_across_tools:
    files_synced_across_all_agents:
      - "comserv-ai-guidelines-consolidated.yaml (PRIMARY - read by all agents at startup)"
      - "/.zencoder/rules/repo.md (Zencoder primary, referenced by other agents)"
      - "/.zencoder/rules/keywords.md (All agents reference for keyword definitions)"
      - "/.zencoder/rules/cleanup-agent-workflow.md (Cleanup Agent enforcement, visible to all)"

# ======================================================================
