ai_response_protocol:
  sources: ["repo.md:316-323"]
  action_over_analysis: "When user asks you to do something, take immediate action instead of explaining what you're going to do"
  concise_explanations: "Provide brief context only when necessary - user prefers action and results"
  no_redundant_verification: "If user states something is true, accept it and proceed - don't re-verify unless explicitly asked"
