    - "These templates are the single source of truth for documentation formatting"

# ======================================================================
# SECTION: CRITICAL SAFETY RULES (REPO.MD - HIGHEST PRIORITY)
# ======================================================================
critical_safety_rules:
  absolute_prohibitions:
    sed_usage: "[CRITICAL] NEVER use sed, awk, perl -i, or bash text manipulation commands. Causes IDE crashes and conversation history loss. ALWAYS use EditFile tool instead."
    sources: ["repo.md:14-35"]
    
  server_lifecycle_control: "[CRITICAL] User has EXCLUSIVE authority over server startup/shutdown. NEVER start/stop Catalyst server autonomously."
    sources: ["repo.md:38-47"]
    
  compaction_crisis: "[CRITICAL] NEVER trigger response compaction. Use /chathandoff instead. Compaction causes PyCharm crashes and history loss."
    sources: ["repo.md:50-66"]
    action: "When response approaching limit → execute /chathandoff INSTEAD of compacting"
    
  bugbuster_protocol: "[MANDATORY] Every response must start with verification checkpoint BEFORE any work"
    sources: ["repo.md:101-120"]
    checkpoint_items:
      - "Critical Safety Rules read? (cite lines)"
      - "File editing workflow understood? (WORKFLOW A vs B)"
      - "Related to previous chats?"
      - "Token budget/handoff strategy understood?"
    blocking_rule: "If ANY checkbox is ❌, STOP and read that section first"

  universal_ask_questions_protocol: "[CRITICAL] ask_questions() is ALWAYS available to gather user input (fixed Dec 9 2025)"
    sources: ["repo.md:69-97", "cleanup-agent-workflow.md:16-32"]
    scope: "ALL agents (Zencoder, Continue, OllamaAssist, Debug)"
    
    absolute_universal_rules:
      rule_1: "✅ /updateprompt MUST execute BEFORE ask_questions() (MANDATORY - NO EXCEPTIONS)"
      rule_2: "✅ Use ask_questions() whenever user input/clarification is needed (AFTER /updateprompt)"
      rule_3: "✅ Use ask_questions() for requirements gathering, trade-off decisions, ambiguity resolution"
      rule_4: "✅ Multiple questions per batch OK (up to 5 in one ask_questions call)"
    
    loop_prevention_rules:
      rule_1: "NEVER ask same question repeatedly without user responding (indicates loop)"
      rule_2: "If user doesn't respond to ask_questions(): Wait for response before continuing"
      rule_3: "NEVER use ask_questions() as filler when you should be taking action"
      rule_4: "If work requires decisions: /updateprompt FIRST, then ask_questions(), then execute after getting answers"
    
    when_ask_questions_is_required:
      - "User request is ambiguous (multiple valid interpretations)"
      - "Multiple valid approaches exist (ask user to choose)"
      - "Missing critical information for task"
      - "Trade-off between competing goals (e.g., speed vs quality)"
      - "User hasn't specified scope/requirements clearly"
    
    loop_detection:
      indicator_1: "Asking same question 2× without user response = LOOP"
      indicator_2: "Asking question without understanding what user already said = LOOP"
      recovery: "If detected: STOP, re-read user's previous messages carefully"
    
    /updateprompt_usage:
      purpose: "Record each prompt's work in current_session.md BEFORE asking questions"
      trigger: "After editing file, BEFORE continuing work, asking questions, or declaring done"
      MANDATORY_execution_order: "/updateprompt MUST execute FIRST, then ask_questions() SECOND"

# ======================================================================
# SECTION: FILE EDITING WORKFLOWS (CRITICAL DISTINCTION)
# ======================================================================
file_editing_workflows:
  workflow_a_create_new_documentation:
    description: "Use when creating NEW .tt files"
    sources: ["repo.md:105-119"]
    steps:
      - "Locate template: documentation_tt_template.tt OR application_tt_template.tt"
      - "Create .tt file directly (NO .md intermediates)"
      - "Update META block and content"
      - "Update page_version and last_updated timestamp"
      - "Commit .tt file (immediately live)"
    critical_rules:
      - "✅ Create NEW documentation as .tt files directly"
      - "❌ NEVER create .md intermediate files"
      - "❌ NEVER edit .tt files directly"
      
  workflow_b_edit_existing_tt_files:
    description: "Use when modifying documentation that ALREADY EXISTS as .tt"
    sources: ["repo.md:122-144", "November 2025 test results"]
    updated: "2025-12-06 - Simplified workflow based on EditFile safety verification"
    steps:
      - "Locate existing .tt file"
      - "Edit directly with EditFile tool (EditFile verified safe for .tt - tested Nov 2025)"
      - "Validate with /validatett after changes"
      - "Done (no .md working copy needed)"
    critical_rules:
      - "✅ EditFile SAFE for direct .tt editing (tested November 2025)"
      - "✅ Always validate with /validatett before deployment"
      - "✅ Always get user approval before applying changes"
      - "✅ Use EditFile tool ONLY (not bash/sed)"
      - "✅ .md working copies ONLY for complex multi-step changes (optional)"
      - "❌ NEVER use sed/bash for modifications"
    rationale: "EditFile proven safe in November tests; simplified workflow reduces file accumulation and speeds up documentation updates. .md working copies now optional rather than mandatory."

# ======================================================================
# SECTION: CODING STANDARDS
# ======================================================================
coding_standards:
  language_style:
    - "Use Perl best practices (strict, warnings, Modern Perl style)"
    - "Follow PBP (Perl Best Practices) for consistency"
    - "Use Module::Install for package management"
    - "Target Perl 5.40.0+ features"
    sources: ["coding-standards-comserv.yaml"]

  architecture:
    - "MVC Pattern: Model/View/Controller separation ENFORCED"
    - "Controllers: RESTful routing, action-based methods in /Comserv/lib/Comserv/Controller/"
    - "Models: DBIx::Class ORM in /Comserv/lib/Comserv/Model/"
    - "Views: Template Toolkit (.tt) in /Comserv/root/"
    reference: "/Documentation/controller_routing_guidelines.tt"
    sources: ["coding-standards-comserv.yaml:20-25", "CONTINUE.md:80-90"]

  database:
    orm: "DBIx::Class"
    schema_management:
      rule: "NEVER create .sql files directly"
      use_instead: "DBSchemaManager.pm programmatically"
      location: "/Comserv/lib/Comserv/Model/DBSchemaManager.pm"
      migrations: "Use DBSchemaManager methods programmatically"
    sources: ["coding-standards-comserv.yaml:27-31"]

  testing:
    framework: "Test::More (Perl standard)"
    also_use: ["Catalyst::Test", "Test::WWW::Mechanize::Catalyst"]
    coverage_goal: "80%+"
    location: "/Comserv/t/"
    sources: ["coding-standards-comserv.yaml:33-37"]

  error_handling:
    - "Use try-catch with Try::Tiny"
    - "Log all errors via Log::Log4perl"
    - "Never expose secrets/keys in logs"
    - "Create meaningful error messages for users"
    logging_method: "Always use log_with_details() method"
    logging_example: "$self->logging->log_with_details($c, 'info', __FILE__, __LINE__, 'method_name', \"message\")"
    sources: ["coding-standards-comserv.yaml:39-43", "AI_Guidelines.tt:34-68"]

  documentation:
    format: "Template Toolkit (.tt) ONLY in /Documentation/"
    templates: "See documentation_tt_template.tt"
    metadata: "Every .tt must have META block: title, description, roles, version, last_updated"
    css: "Use theme variables ONLY (var(--text-color), NO hex colors)"
    navigation: "Each .tt must have self-contained TOC with absolute anchors"
    version_tracking: "Use PageVersion RCS line; increment version on each edit"
    sources: ["coding-standards-comserv.yaml:45-51"]

  filename_and_package_consistency:
    rule: "Filenames must match package declarations"
    correct: "File: Documentation.pm → Package: Comserv::Controller::Documentation"
    incorrect: "File: Documantation.pm → Package: Comserv::Controller::Documentation"
    known_issue: "Previous mismatch caused /documentation and /Documentation routes to fail"
    sources: ["AI_Guidelines.tt:19-32"]

# ======================================================================
# SECTION: AI GUIDELINES FOR CODE CHANGES
# ======================================================================
ai_code_guidelines:
  file_modification:
    rule: "[CRITICAL] Never replace or modify existing files without explicit user permission"
    workflow: "Always ask for confirmation before making changes to codebase"
    no_backup_files: "[CRITICAL] NEVER create .backup files when modifying existing files"
    why_no_backups: "Backup files eliminate user's ability to read changes; consume unnecessary resources"
    use_instead: "Provide exact changes in +/- diff format for copy-paste ready application"
    sources: ["AI_DEVELOPMENT_GUIDELINES.md:15-24", "AI_Guidelines.tt:1-6"]

  code_generation:
    - "Generate code in small, testable chunks (single function per change)"
    - "Prefer async operations for I/O-bound tasks"
    - "Avoid deprecated libraries; use modern Perl modules"
    - "Always run lint after modifications (perl -c, perlcritic)"
    - "Always run typecheck/validation tools after code changes"
    sources: ["coding-standards-comserv.yaml:54-59"]

  file_reading:
    - "ALWAYS read existing files BEFORE editing"
    - "Understand code context and conventions before modifying"
    - "Never assume library availability—verify in use statements"
    - "Look at neighboring files to understand style/patterns"
    - "Follow existing code patterns before creating new ones"
    - "Identify and reuse existing modules, utilities, and templates"
    sources: ["coding-standards-comserv.yaml:61-65", "AI_DEVELOPMENT_GUIDELINES.md:9-14"]

  documentation_sync:
    trigger: "When code is modified, check if documentation needs update"
    locations:
      controller_added: "Create /Documentation/controllers/controller_name.tt"
      model_added: "Create /Documentation/models/model_name.tt"
      feature_added: "Create /Documentation/features/feature_name.tt"
      system_utility: "Create /Documentation/system/utility_name.tt"
      integration_added: "Create /Documentation/operations/integration_setup.tt"
    cross_reference: "Ensure docs match implementation"
    zencoder_agent: "DocumentationSyncAgent monitors this automatically"
    sources: ["coding-standards-comserv.yaml:67-72", "documentation-synchronization-agent.md:145-209"]

  security:
    - "Never commit secrets, keys, or passwords"
    - "Never log sensitive data (passwords, tokens, API keys)"
    - "Validate all user inputs"
    - "Use parameterized queries (DBIx::Class handles this)"
    sources: ["coding-standards-comserv.yaml:74-78"]

  testing:
    - "Write tests alongside code changes"
    - "Run test suite after modifications: `perl -t` or `prove t/`"
    - "Verify tests pass before completing task"
    - "Check for test coverage regressions"
    sources: ["coding-standards-comserv.yaml:80-84"]

# ======================================================================
# SECTION: DOCUMENTATION STANDARDS (COMPREHENSIVE)
# ======================================================================
documentation_standards:
  directory_structure:
    sources: ["AI_DOCUMENTATION_GUIDELINES.md:8-20"]
    structure:
      changelog: "/changelog/ - Documentation of changes and fixes"
      controllers: "/controllers/ - Controller-specific documentation"
      models: "/models/ - Model-specific documentation"
      deployment: "/deployment/ - Deployment and server setup guides"
      system: "/system/ - System-level documentation"
      themes: "/themes/ - Theme system documentation"
      tutorials: "/tutorials/ - User and developer tutorials"
      general: "/general/ - General documentation"
      features: "/features/ - Feature-specific documentation"
      operations: "/operations/ - Operations and integration setup"

  absolute_prohibitions:
    sources: ["AI_DOCUMENTATION_GUIDELINES.md:23-36"]
    rule_1: "NEVER create documentation files in application root directory"
    rule_2: "NEVER create categorization files (e.g., 'Added X to Y category')"
    rule_3: "NEVER create temporary files"
    all_documentation: "Must be placed in appropriate subdirectory of /Comserv/root/Documentation/"

  file_format_rules:
    sources: ["AI_DOCUMENTATION_GUIDELINES.md:52-59", "documentation-editing-standards-v2.md:1-19"]
    rule_1: "For browser display: Use .tt extension with Template Toolkit format"
    rule_2: "For AI processing: Use .md extension (ONLY in session_history/)"
    rule_3: "NEVER use markdown syntax in .tt files - use plain text with Template Toolkit formatting"
    rule_4: "If documentation found in .md, convert to .tt for browser display"
    [DUPLICATION]: "Same rule appears in both AI_DOCUMENTATION_GUIDELINES.md and documentation-editing-standards-v2.md"

  file_naming:
    sources: ["AI_DOCUMENTATION_GUIDELINES.md:60-64"]
    convention: "Use lowercase with underscores for spaces"
    changelog_format: "YYYY-MM-description.tt"
    controller_format: "ControllerName.tt"
    consistency: "Follow established naming patterns"

  documentation_structure:
    sources: ["AI_DOCUMENTATION_GUIDELINES.md:65-71", "documentation-editing-standards-v2.md:7"]
    standard_sections:
      - "Clear title using # Title"
      - "Overview section"
      - "Appropriate headings for sections"
      - "Code examples where relevant"
      - "Links to related documentation"
    detailed_template_structure:
      description: "For comprehensive .tt files, use this detailed section structure"
      preferred_order:
        - "Overview (summary of purpose/scope)"
        - "Prerequisites (what's needed before use)"
        - "Key Features (main capabilities)"
        - "Getting Started (steps/code examples)"
        - "Advanced (complex topics)"
        - "Troubleshooting (common issues with solutions, use warning/info divs)"
        - "Config Table (settings/parameters reference)"
        - "See Also (related docs, use success div)"
        - "Footer (version, last updated, author)"
    drift_reduction_principle: "Prioritize file reads over chat history; standardize versions/dates to reduce drift"

  template_toolkit_requirements:
    sources: ["documentation-editing-standards-v2.md:5-18"]
    must_include:
      - "[% META %] block with title, description, roles, version, last_updated"
      - "[% PageVersion %] RCS line for version tracking"
      - "Debug mode support: [% IF c.session.debug_mode == 1 %]"
      - "<div class=\"container\"> with .row/.col grid structure"
      - "Inline CSS variables: var(--text-color), var(--primary-color), etc."
      - "Semantic HTML: <h2 id=\"...\">, <ul>, <pre><code>"
      - "Unique TOC (id=\"toc\") with absolute anchors"
    must_not_include:
      - "Inline color definitions (color: #123456)"
      - "Hard-coded hex colors"
      - "Relative paths (use absolute)"
    css_variables_required:
      - "var(--text-color)"
      - "var(--text-muted-color)"
      - "var(--primary-color)"
      - "var(--header-font)"
      - "var(--body-font)"
      - "var(--spacing-small/medium/large)"

  documentation_validation:
    sources: ["documentation-editing-standards-v2.md:2-18"]
    before_edit: "ALWAYS read the file with read_file and verify state with parallel tools"
    ignore_chat_history: "If chat history conflicts with file state, ALWAYS treat file as source of truth (critical for accuracy)"
    reflect_live_code: "Documentation must match current implementation"
    log_changes: "Update metadata and changelog references"
    version_format: "Start at 0.01, increment by .01 on each edit (0.01 → 0.02 → 0.03 ... → 0.99 → 1.00 → 1.01, etc.) - X.YY format where X is major, YY is minor"
    ai_readability: "Prioritize AI comprehension: Use structured Template Toolkit with no ambiguity; clear section markers; semantic HTML"
    human_vs_ai_readability: "Balance human readability (clear sections, tables, headers) with AI readability (structured markup, unambiguous syntax)"
    date_formats:
      "[CONFLICT]": "Different date formats specified in different guidelines"
      requirement_1: "YYYY-MM-DD for divs"
      requirement_2: "Full 'Fri MMM DD HH:MM:SS TZ YYYY' for META"
      requirement_3: "'HH:MM:SS YYYY/MM/DD' for PageVersion"
    standardization_note: "All variations should be eliminated (see conflicts section below)"

# ======================================================================
# SECTION: IDE STABILITY PROTOCOLS
# ======================================================================
ide_stability:
  context_loads:
    - "Avoid large context loads (use file_search to narrow scope)"
    - "Keep responses concise (prevent PyCharm IDE crashes from token bloat)"
    sources: ["coding-standards-comserv.yaml:86-91"]

  handoff_strategy:
    use_chathandoff: "When response approaching length limit (instead of compacting)"
    use_sessionhandoff: "When current_session.md exceeds 400 lines"
    never_compaction: "Compaction causes PyCharm crashes and history loss"

  file_modification_tools:
    rule: "Use EditFile tool ONLY for modifications"
    never_use: "bash sed/awk commands (causes IDE crashes)"
    never_use_cp_mv: "Use EditFile/WriteFile tools instead"
    decision_rule: "If shell command seems necessary, FIRST check if EditFile can solve it"
    sources: ["coding-standards-comserv.yaml:86-91", "repo.md:294-313"]

# ======================================================================
# SECTION: BROWSER USAGE RULES
# ======================================================================
browser_usage:
  sources: ["repo.md:196-227"]
  high_cost_resource: "Browser operations are expensive - use sparingly and only when necessary"
  
  when_to_use_browser:
    - "Keywords explicitly requiring web interface interaction (/checktodos, /sessionhandoff, etc.)"
    - "User explicitly requests 'test in browser', 'verify UI', or 'check web interface'"
    - "Form functionality testing when specifically requested"
    - "Visual/styling verification required"
  
  when_not_to_use_browser:
    - "Code analysis and understanding"
    - "File structure exploration"
    - "Template (.tt file) editing and modification"
    - "Configuration changes"
    - "Documentation updates"
    - "Logic implementation in Perl modules"
    - "Database schema review"
    - "Most development tasks can be completed with file operations"
  
  session_management:
    - "NEVER close the browser - Keep browser open throughout entire work session"
    - "REUSE existing session - Check if already logged in before re-authenticating"
    - "Only login once - At start of day or if authentication error received"
    - "Use browser tabs - For multiple pages instead of closing/reopening"
    - "Session persistence - Catalyst sessions persist, don't waste resources re-authenticating"

# ======================================================================
# SECTION: SHELL COMMAND USAGE (CONDITIONAL)
# ======================================================================
shell_command_usage:
  sources: ["repo.md:294-313"]
  critical_change_dec_2025: "All file operations now use EditFile/WriteFile tools ONLY. Shell commands cause IDE crashes and conversation history loss."
  
  allowed_for_diagnostics:
    - "✅ Running `date` for document timestamps (minimal usage only)"
    - "✅ Checking network connectivity: `nc -zv`, `ping`, `curl`"
    - "✅ Viewing logs: `tail`, `head`, `less` in log files (read-only)"
    - "✅ Running tests: `perl -t`, test frameworks (when explicitly requested)"
  
  absolutely_prohibited:
    - "❌ **ANY file modifications** - MUST use EditFile tool"
    - "❌ **sed, awk, perl -i** (ABSOLUTE PROHIBITION - causes IDE crashes)"
    - "❌ `cp`, `mv`, `find` for file operations - use EditFile/WriteFile tools"
    - "❌ **Repeated status checks** - use file operations instead"
    - "❌ **Process kills** without understanding impact (e.g., `pkill -9 perl`)"
    - "❌ Multiple server startup attempts without validating previous failures"
  
  decision_rule: "If shell command execution seems necessary, FIRST check if EditFile tool can solve it"
  trigger_handoff: "If used >2 times consecutively without clear progress, handoff triggered"

# ======================================================================
# SECTION: MANUAL-APPLY SETTINGS (WORKAROUND PROTOCOL)
# ======================================================================
manual_apply_workaround:
  sources: ["repo.md:230-256"]
  current_reality:
