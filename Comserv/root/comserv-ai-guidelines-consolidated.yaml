# ======================================================================
# SECTION: ZENCODER-SPECIFIC RULES (DOCUMENTATION SYNC AGENT)
# ======================================================================
zencoder_specific:
  sources: ["documentation-synchronization-agent.md:1-400"]
  
  documentation_sync_agent:
    purpose: "Maintain documentation-to-code consistency, enforce file format standards, validate template conformance, keep documentation current with application features"
    agent_name: "DocumentationSyncAgent or DocSyncAgent"
    scope: "Owns ONLY documentation consistency and synchronization—NOT documentation content creation (user's domain)"
  
  core_responsibility_1_format_enforcement:
    priority: "HIGH"
    rule: "All files in `/Comserv/root/Documentation/` MUST be `.tt` format (Template Toolkit)"
    note: "Zencoder configuration files in /.zencoder/rules/ may use .md format for rules (separate scope from Documentation/)"
    
    violations_to_detect:
      - ".md files in `/Documentation/` directory (non-rules)"
      - ".md files with corresponding `.tt` equivalent"
      - "Orphaned `.md` files (no `.tt` counterpart)"
    
    actions_when_violation_detected:
      ".md AND .tt equivalent exists":
        step_1: "Verify .tt has all content from .md (content parity check)"
        step_2: "Check .md has NOT been edited more recently than .tt"
        step_3: "IF .tt is current: Delete .md with user confirmation"
        step_4: "IF .md is newer: Alert user that .tt is stale, suggest merge"
        step_5: "IF neither has clear authority: Mark as conflict, require manual review"
      
      ".md AND NO .tt equivalent":
        step_1: "Check file age (when created)"
        step_2: "IF created <24 hours ago: Alert 'Convert to .tt and delete .md within 24 hours'"
        step_3: "IF created >24 hours ago: Alert 'Orphaned .md file—convert to .tt or delete'"
        step_4: "IF high value content: Flag for immediate conversion to .tt"
        step_5: "After conversion verified: Delete .md"
    
    trigger_points:
      - "On file save in `/Documentation/`"
      - "Daily scan of entire `/Documentation/` directory"
      - "When user requests file cleanup report"
  
  core_responsibility_2_template_conformance:
    priority: "HIGH"
    rule: "Every `.tt` file in `/Documentation/` MUST conform to `documentation_tt_template.tt`"
    
    mandatory_elements:
      meta_block: |
        [% META
           title = "Document Title"
           description = "Brief description"
           roles = "admin,developer"
           TemplateType = "Documentation"
           category = "category_name"
           page_version = "0.01"
           last_updated = "Format: 'Fri Nov 30 12:00:00 PST 2025'"
           site_specific = "false"
        %]
      
      pageversion_line: "[% PageVersion = 'path/to/file.tt,v X.XX YYYY/MM/DD author Exp author ' %]"
      
      debug_mode_support: |
        [% IF c.session.debug_mode == 1 %]
            [% PageVersion %]
        [% END %]
      
      theme_compliant_css:
        must_use: ["var(--text-color)", "var(--primary-color)", ".container", ".row", ".col-*", "var(--spacing-small/medium/large)", "var(--header-font)", "var(--body-font)"]
        must_not_use: ["inline colors like color: #123456", "var(--text-muted-color) without theme support"]
      
      last_updated_metadata: |
        <div class="last-updated" style="color: var(--text-muted-color);">
            Last Updated: YYYY-MM-DD | Version: X.XX | Author: Name | Status: Active
        </div>
    
    validation_steps:
      step_1: "CHECK: META block present and properly formatted"
      step_2: "CHECK: PageVersion line present"
      step_3: "CHECK: Debug mode guard present"
      step_4: "SCAN: CSS for inline color definitions"
      step_5: "SCAN: Layout classes (.container, .row, .col-)"
      step_6: "CHECK: last_updated format"
      step_7: "IF ANY FAIL: Agent refuses to process file changes"
      step_8: "IF ALL PASS: File is valid, proceed with other checks"
    
    trigger_points:
      - "Before accepting ANY `.tt` file edit/creation"
      - "On `/validatett` command (run manually)"
      - "Daily scan of all `.tt` files in `/Documentation/`"
  
  core_responsibility_3_code_to_docs_sync:
    priority: "HIGH"
    rule: "When application code changes, documentation MUST be kept in sync"
    
    what_triggers_sync_check:
      - "Controller file modified → Check for controller documentation"
      - "New model added → Check for model documentation"
      - "New feature added → Check for feature documentation"
      - "API endpoint changed → Check for API documentation"
      - "Configuration option added → Check for configuration documentation"
    
    feature_to_documentation_mapping:
      "lib/Comserv/Controller/Feature.pm": "/Documentation/controllers/Feature.tt"
      "lib/Comserv/Model/DBIx/Result/Model.pm": "/Documentation/models/Model.tt"
      "New feature in /root/feature_name/": "/Documentation/features/feature_name.tt"
      "System utility added": "/Documentation/system/utility.tt"
      "New integration (e.g., Ollama)": "/Documentation/operations/integration_setup.tt"
    
    trigger_points:
      - "When any `.pm` file (Perl controller/model) is modified"
      - "When new directory added to `/root/`"
      - "On user request for sync report"
      - "Daily scan for missing documentation"
  
  core_responsibility_4_duplicate_detection:
    priority: "MEDIUM"
    rule: "Each topic has exactly ONE authoritative documentation file"
    
    scenarios:
      scenario_1: "Multiple .tt files with same content → Identify authoritative, archive older"
      scenario_2: "Same topic in multiple categories → Consolidate into single file"
      scenario_3: ".md and .tt covering same topic → Already handled by Format Enforcement"
      scenario_4: "Multiple versions with unclear authority → Establish clear 'current' version"
    
    versioning_standard:
      authoritative: "filename.tt (no version suffix)"
      old_versions: "filename-v1.tt, filename-v2.tt, etc. OR filename-2025-11-30.tt"
    
    trigger_points:
      - "Weekly scan for duplicates"
      - "When new file added to `/Documentation/`"
      - "On user request for redundancy report"
  
  core_responsibility_5_cleanup_scheduler:
    priority: "MEDIUM"
    rule: "Maintain directory cleanliness; identify and flag files for removal"
    
    cleanup_targets:
      target_1_orphaned_md: "Orphaned .md files (>24 hours without conversion)"
      target_2_archived: "Archived/Obsolete files (names like '-v1', '-old', '-backup', '-deprecated', created >30 days ago)"
      target_3_empty_stubs: "Empty or stub .tt files (<200 bytes, created >14 days ago)"
      target_4_unlinked: "Unlinked documentation (no cross-references, created >30 days ago)"
      target_5_naming: "Inconsistent naming (not snake_case, mixed capitalization)"
  
  conflict_resolution_priorities:
    sources: ["documentation-synchronization-agent.md:362-382"]
    authority_by_date: "Newest last_updated wins (timestamp in `last_updated` field)"
    authority_by_version: "Explicit version numbers (v2 > v1)"
    authority_by_format: "`.tt` in `/Documentation/` > `.md` anywhere"
    authority_by_location: "Category-specific subdirs > root Documentation/"
    manual_review: "If unclear, flag for user decision"
    
    when_md_and_tt_conflict:
      ".tt is ALWAYS authoritative": "For `/Documentation/` content"
      ".md must be updated": "To match `.tt` or deleted"
      exception: "`.continue/rules/*.md` files are authoritative for agent config"
    
    when_code_and_docs_conflict:
      "CODE IS SOURCE OF TRUTH": "Documentation must be updated within 24 hours"
      "If update not possible": "Mark documentation as 'NEEDS UPDATE' in META"
      example: "status = 'Needs Update - Code changed 2025-12-04'"

