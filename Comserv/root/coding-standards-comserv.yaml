# ═══════════════════════════════════════════════════════════════════════════
# SECTION 9: SECURITY GUIDELINES
# ═══════════════════════════════════════════════════════════════════════════

security:
  [SOURCE]: "guidelines.tt (section stub - partially filled)"
  
  secrets_and_keys:
    requirement: "[CRITICAL] Never commit secrets, keys, or passwords to repository"
    enforcement: "Use environment variables or .env files (gitignored)"
    files_to_protect: "API keys, database passwords, private keys, tokens"
  
  logging_security:
    requirement: "[CRITICAL] Never log sensitive data"
    prohibited: "Passwords, tokens, API keys, credit card numbers, SSN, PII"
    approach: "Always sanitize/mask sensitive data before logging"
    example: |
      ✅ CORRECT:
      Log: "User login attempted: user123"
      
      ❌ WRONG:
      Log: "User login with password: [PASSWORD]"
  
  input_validation:
    requirement: "[MANDATORY] Validate all user inputs"
    approach: "Check type, length, format before processing"
    parameterized_queries: "Use parameterized queries (DBIx::Class handles automatically)"
    xss_prevention: "Use HTML escaping in templates: `[% value | html %]`"
  
