# ═══════════════════════════════════════════════════════════════════════════
# SECTION 1: PROJECT OVERVIEW
# ═══════════════════════════════════════════════════════════════════════════

project_overview:
  name: "Comserv - Business Operations Management System"
  tagline: "Comprehensive web application for project management, documentation, site administration, and user management"
  
  technical_stack:
    language: "Perl"
    language_version: "5.40.0+ (via Perlbrew)"
    framework: "Catalyst (MVC Web Framework)"
    web_server: "Catalyst development server / Apache/Nginx with FastCGI"
    orm: "DBIx::Class"
    templating: "Template Toolkit (.tt files)"
    database: "MySQL/PostgreSQL (via DBIx::Class)"
    
  key_modules:
    - "Catalyst::Runtime (5.90130+)"
    - "Moose (OOP framework)"
    - "DBIx::Class (ORM)"
    - "Template (Template Toolkit)"
    - "Email::Sender::Simple"
    - "JSON"
    - "YAML::XS"
    - "DateTime"
    - "Log::Log4perl"
    - "Try::Tiny (error handling)"
  
  directory_structure:
    code: "/Comserv/lib/Comserv/ - Application code (Controllers, Models, etc.)"
    views: "/Comserv/root/ - Template Toolkit (.tt) files and static assets"
    tests: "/Comserv/t/ - Test suite"
    config: "/Comserv/config/ - Configuration files"
    scripts: "/Comserv/script/ - Utility scripts"
    docs: "/Comserv/root/Documentation/ - System documentation (.tt format ONLY)"

---

# ═══════════════════════════════════════════════════════════════════════════
# SECTION 2: ARCHITECTURE & STRUCTURE
# ═══════════════════════════════════════════════════════════════════════════

architecture:
  pattern: "MVC (Model-View-Controller) - STRICTLY ENFORCED"
  
  controllers:
    location: "/Comserv/lib/Comserv/Controller/"
    standards:
      - "Use RESTful routing principles where applicable"
      - "Keep business logic OUT of controllers - delegate to models"
      - "Use explicit namespace declarations (e.g., `__PACKAGE__->config(namespace => 'MyController')`)"
      - "[CRITICAL] NEVER use `:Path('/')` in site-specific controllers (causes all sites to return same content)"
      - "Use `:Local` or `:Chained` for safer routing"
      - "Always forward to view explicitly: `$c->forward($c->view('TT'))`"
      - "Include proper logging in auto() method"
      - "Implement role-based access control (check_user_roles)"
    
    routing_guidelines:
      attribute_path: "Use `:Path` with caution - `:Path('/')` captures root for ALL domains (⚠️ AVOID IN SITE-SPECIFIC)"
      attribute_local: "Safer - appends method name to controller namespace"
      attribute_chained: "Best for complex apps - creates action chain"
      root_controller: "ONLY Comserv::Controller::Root should handle root path `/`"
      site_specific: "Set namespace to site name (e.g., 'USBM'); use `:Path` without args or `:Local`"
    
    [ISSUE_MARKER_ROUTING]: "CONSTRAINT: This routing behavior is critical - multiple recent bugs caused by `:Path('/')` usage"
  
  models:
    location: "/Comserv/lib/Comserv/Model/"
    standards:
      - "Use DBIx::Class for database access (ORM pattern)"
      - "Keep models focused - one model per logical entity"
      - "Move all business logic to models, NOT controllers"
      - "Use Moose for OOP structure"
      - "Schema changes ONLY via DBSchemaManager.pm (NEVER create .sql files)"
    
    database_schema_manager:
      location: "/Comserv/lib/Comserv/Model/DBSchemaManager.pm"
      usage: "[MANDATORY] All database schema operations go through DBSchemaManager methods"
      violation: "[CRITICAL] Creating .sql files directly violates this standard - they get deleted immediately"
      approach: "Use DBSchemaManager methods programmatically for all table creation, modification, migration"
  
  views:
    location: "/Comserv/root/"
    format: "Template Toolkit (.tt files ONLY)"
    standards:
      - "All view files must be .tt format (Template Toolkit)"
      - "Use application_tt_template.tt for application pages (interactive features)"
      - "Use documentation_tt_template.tt for documentation pages (static content)"
      - "[DUPLICATE] Both template files define structure - see TEMPLATE STANDARDS section for details"

---

# ═══════════════════════════════════════════════════════════════════════════
# SECTION 3: TEMPLATE STANDARDS (Merged from both .tt template files)
# ═══════════════════════════════════════════════════════════════════════════

template_standards:
  
  metadata_requirements:
    description: "Every .tt file MUST have META block at top"
    required_fields:
      title: "Page/component title"
      description: "Brief description of content"
      roles: "Required roles to view (comma-separated: admin,developer,editor,user)"
      page_version: "Semantic version (0.01, 0.02, 1.01, etc.) - increment on each edit"
      last_updated: "Current date/time stamp (see timestamp_format below)"
      site_specific: "boolean - is this site-specific? (use 'false' for global)"
      category: "Content category (templates, features, administration, etc.)"
      TemplateType: "Type (Documentation or Application)"
    
    example_meta_block: |
      [% META
         title = "Page Title"
         description = "What this page does"
         roles = "admin,developer"
         page_version = "0.01"
         last_updated = "2025-12-06T22:51:00Z"
         site_specific = "false"
         category = "Documentation"
         TemplateType = "Documentation"
      %]
    
    [DUPLICATE]: "Both application_tt_template.tt and documentation_tt_template.tt define similar META blocks"
  
  version_tracking:
    rcs_line: "[MANDATORY] Include RCS line after META block for version tracking"
    format: |
      [% PageVersion = 'Path/to/file.tt,v VERSION TIMESTAMP AUTHOR STATUS' %]
      Example: [% PageVersion = 'Documentation/guidelines.tt,v 0.02 2025/12/06 08:30:00 shanta Exp' %]
    increment_rules:
      - "Increment minor version (0.01 → 0.02 → 0.03) for each edit"
      - "Jump to major version (0.99 → 1.00) for significant changes/restructuring"
      - "Always update TIMESTAMP when making changes (use system date command)"
    
    debug_display: "Include conditional display of PageVersion for debugging: `[% IF c.session.debug_mode == 1 %] [% PageVersion %] [% END %]`"
  
  theme_compliance:
    [CONSOLIDATED_FROM]: "documentation_tt_template.tt theme compliance notes"
    
    css_variables:
      description: "ALL styling MUST use CSS custom properties - NEVER hardcode colors or fonts"
      required_variables:
        text_colors:
          - "--text-color (primary text)"
          - "--text-muted-color (secondary/muted text)"
          - "--background-color"
        fonts:
          - "--header-font (h1-h6 styling)"
          - "--body-font (paragraph/default text)"
        sizing:
          - "--font-size-small"
          - "--font-size-base"
          - "--font-size-large"
        spacing:
          - "--spacing-small"
          - "--spacing-medium"
          - "--spacing-large"
        ui_colors:
          - "--primary-color (main action color)"
          - "--secondary-color (alternate action)"
          - "--warning-color (warnings/cautions)"
          - "--success-color (success states)"
          - "--info-color (informational)"
          - "--border-color"
          - "--table-header-bg"
      
      example_usage: |
        ✅ CORRECT:
        <h1 style="color: var(--text-color); font-family: var(--header-font);">Title</h1>
        
        ❌ WRONG (hardcoded):
        <h1 style="color: #000000; font-family: Arial;">Title</h1>
    
    cross_theme_compatibility:
      description: "Templates must work across multiple themes without modification"
      supported_themes:
        - "Default theme (standard blue/white)"
        - "CSC theme (cyan backgrounds)"
        - "USBM theme (green accent colors)"
        - "APIS theme (yellow/orange beekeeping theme)"
        - "Future themes (added via theme_definitions.json)"
      verification: "Test with multiple themes to ensure variable-based styling works everywhere"
  
  application_templates:
    [SOURCE]: "application_tt_template.tt (353 lines)"
    purpose: "Interactive application pages with forms, data display, user interactions"
    
    structure:
      main_container: "<div class=\"app-container\"> - Main application page wrapper"
      header: "<div class=\"page-header\"> - Page title and optional subtitle"
      breadcrumbs: "<div class=\"breadcrumb-container\"> - Navigation breadcrumbs (optional)"
      content_area: "<div class=\"content-container\"> - All content goes here"
      primary_content: "<div class=\"content-primary\"> - Main content area"
      sidebar: "<div class=\"content-sidebar\"> - Sidebar (optional)"
      footer: "<div class=\"page-footer\"> - Footer with actions (optional)"
      admin_only: "[% IF c.check_user_roles('admin') %] - Admin-only content"
      developer_only: "[% IF c.check_user_roles('developer') %] - Developer-only content"
    
    form_patterns:
      container: "<div class=\"form-container\">"
      section: "<div class=\"form-section\"> - Grouped related fields"
      row: "<div class=\"form-row\"> - Single row of form fields"
      field: "<div class=\"form-field\"> - Individual field wrapper"
      input: "<input class=\"form-input\"> - Input field styling"
      actions: "<div class=\"form-actions\"> - Submit/Cancel buttons"
    
    data_display_patterns:
      container: "<div class=\"data-container\">"
      table_container: "<div class=\"table-container\">"
      table: "<table class=\"data-table\">"
      action_cell: "<td class=\"action-cell\"> - Edit/Delete action buttons"
      empty_state: "<div class=\"empty-state\"> - Message when no data"
    
    global_css_classes: |
      Containers: app-container, content-container, form-container, data-container, 
                  table-container, sidebar-container
      Layout: page-header, page-subtitle, content-primary, content-sidebar, 
              page-footer, breadcrumb-container
      Forms: app-form, form-section, form-row, form-field, form-input, form-actions
      Data: data-table, action-cell, empty-state, sidebar-list, sidebar-section
      Buttons: btn, btn-primary, btn-secondary, btn-sm, btn-edit, btn-delete
      State: admin-only, developer-only, user-only, loading, error, success
    
    template_variables:
      description: "Common variables set in controller and used in application templates"
      common_variables:
        title: "Page title"
        subtitle: "Optional subtitle"
        show_form: "boolean - show form section?"
        show_data: "boolean - show data display section?"
        show_sidebar: "boolean - show sidebar?"
        show_footer: "boolean - show footer?"
        form_action: "URL for form submission"
        form_data: "Hash of form field values"
        data_items: "Array of data to display"
        breadcrumbs: "Array of breadcrumb objects"
        back_url: "URL for back button"
    
    catalyst_patterns: |
      Loop with alternating rows:
        [% FOREACH item IN items %]
          <div class="[% loop.count % 2 ? 'row-even' : 'row-odd' %]">
      
      Conditional content:
        [% IF items.size %]
          Found [% items.size %] items
        [% ELSE %]
          No items found
        [% END %]
      
      Include common templates:
        [% INCLUDE 'common/error_messages.tt' %]
        [% INCLUDE 'common/success_messages.tt' %]
      
      Role-based visibility:
        [% IF c.check_user_roles('admin','developer') %]
          <div class="admin-actions">...
      
      Safe HTML output (prevent XSS):
        <input value="[% user_input | html %]">
      
      URL generation:
        <a href="[% c.uri_for('/controller/action', item.id) %]">
  
  documentation_templates:
    [SOURCE]: "documentation_tt_template.tt (196 lines)"
    purpose: "Static documentation and reference pages (no forms/interactions)"
    
    recommended_sections:
      1_overview: "Brief 1-2 sentence explanation of what this documents"
      2_prerequisites: "What's needed before using (requirements, system access, etc.)"
      2_key_features: "What this feature/system provides"
      3_getting_started: "Step-by-step setup instructions with code examples"
      4_advanced_usage: "Advanced features and integration points"
      5_troubleshooting: "Common problems and solutions (color-coded: warning/info blocks)"
      6_configuration_reference: "Parameter table with defaults and descriptions"
      7_see_also: "Links to related documentation (success block)"
      8_footer: "Support contact info and metadata"
    
    color_coded_blocks:
      warning_block: "Light background + warning-color left border - for warnings/cautions"
      info_block: "Light background + info-color left border - for informational content"
      success_block: "Light background + success-color left border - for 'See Also' section"
      code_block: "Monospace font background for code examples"
    
    layout_system:
      container: "<div class=\"container\"> - Main content wrapper"
      row: "<div class=\"row\"> - Horizontal grouping"
      col_100: "<div class=\"col-100\"> - Full width"
      col_50: "<div class=\"col-50\"> - Half width (sidebar layout)"
      responsive: "Layout automatically adapts on mobile via layout.css media queries"
    
    configuration_table:
      structure: "HTML table with Parameter, Type, Default, Description columns"
      styling: "CSS classes data-table with var(--table-header-bg) and theme colors"
      stripe_rows: "Alternate rows with var(--secondary-color) background"
    
    [DUPLICATE]: "Both application and documentation templates show similar grid/container structure"
  
  universal_patterns:
    description: "Patterns used in BOTH application and documentation templates"
    
    metadata_header:
      - "Both require META block"
      - "Both include PageVersion RCS line"
      - "Both use same version tracking format"
    
    theme_compliance:
      - "Both use CSS variables exclusively"
      - "Both must work across multiple themes"
      - "Both reference theme_definitions.json"
    
    catalyst_integration:
      - "Both can include Catalyst objects (c.uri_for, c.check_user_roles, etc.)"
      - "Both can access stash variables set in controllers"
      - "Both use Template Toolkit language features ([% ... %])"
    
    html_structure:
      - "Both use semantic HTML5 elements"
      - "Both use .container/.row/.col-XX grid system"
      - "Both maintain heading hierarchy (h1→h6)"
      - "Both include accessibility features (ARIA labels, alt text)"
    
    [CONSOLIDATION_NOTE]: "Both templates share ~60% structural similarity - see templates for specifics"

---

# ═══════════════════════════════════════════════════════════════════════════
# SECTION 4: CATALYST FRAMEWORK STANDARDS
# ═══════════════════════════════════════════════════════════════════════════

catalyst_framework:
  [SOURCE]: "guidelines.tt + controller_routing_guidelines.tt"
  
  core_principles:
    - "Use Moose for object-oriented programming"
    - "Keep controllers slim - move business logic to models"
    - "Use clear and descriptive names for actions and methods"
    - "Implement error handling gracefully"
    - "Log important operations and errors"
  
  controller_design:
    namespaces:
      requirement: "[MANDATORY] Every controller MUST have explicit namespace declaration"
      format: "__PACKAGE__->config(namespace => 'ControllerName');"
      purpose: "Ensures controller only responds to paths starting with /ControllerName"
      example: |
        # In Comserv::Controller::Admin
        __PACKAGE__->config(namespace => 'Admin');
        # Now responds to /Admin/... paths only
    
    action_attributes:
      path_attribute:
        dangerous: "`:Path('/')` - Captures root path for ALL domains ⚠️ NEVER USE in site-specific controllers"
        safe_absolute: "`:Path('/specific')` - Captures specific absolute path"
        namespace_based: "`:Path` (no args) - Captures controller's namespace path"
      local_attribute:
        description: "Appends method name to controller namespace (SAFER than :Path)"
        example: "sub method :Local → Captures /Namespace/method"
      chained_attribute:
        description: "Best for complex apps - creates action chain"
        use_case: "Multi-step workflows, complex routing logic"
    
    [CRITICAL_CONSTRAINT]: "`:Path('/')` in site-specific controllers causes 'all sites return USBM home page' bug"
  
  logging_requirement:
    [SOURCE]: "controller_routing_guidelines.tt"
    mandatory: "Every controller MUST include logging"
    implementation: |
      use Comserv::Util::Logging;
      
      has 'logging' => (
          is => 'ro',
          default => sub { Comserv::Util::Logging->instance }
      );
      
      sub auto :Private {
          my ($self, $c) = @_;
          $self->logging->log_with_details(
              $c, 'info', __FILE__, __LINE__, 'auto',
              "Controller auto method called"
          );
          return 1;
      }
  
  view_forwarding:
    requirement: "[MANDATORY] Always explicitly forward to view"
    implementation: |
      $c->stash(template => 'MyTemplate.tt');
      $c->forward($c->view('TT'));
    purpose: "Ensures template rendering happens in expected order"
  
  site_specific_controllers:
    naming: "Name controller after site (e.g., Comserv::Controller::USBM for USBM site)"
    namespace: "Set namespace to site name: `__PACKAGE__->config(namespace => 'USBM');`"
    routing: "Use `:Path` without arguments OR `:Local` for index method"
    constraint: "[CRITICAL] Do NOT use `:Path('/')` - only Root controller should handle root path"
    root_controller_role: "ONLY Comserv::Controller::Root should handle root path (/)"
  
  testing_controllers:
    requirement: "Test controllers with multiple domains to ensure correct routing"
    common_bug: "Controllers with `:Path('/')` incorrectly capture all site routes"
    verification: "After creating/modifying controller, test across all domains"

---

# ═══════════════════════════════════════════════════════════════════════════
# SECTION 5: DEVELOPMENT STANDARDS
# ═══════════════════════════════════════════════════════════════════════════

development_standards:
  [SOURCE]: "guidelines.tt"
  
  code_format:
    patch_format: "Use `+-` patch format for code returns (prevents overwriting existing functions)"
    clarity: "Changes should be clear and maintainable"
    documentation: "All code returns should be well-commented"
  
  error_handling:
    library: "Try::Tiny for error handling"
    logging: "Log all errors via Log::Log4perl"
    security: "NEVER expose secrets/keys/passwords in logs or error messages"
    user_messages: "Create meaningful error messages for end users"
    example: |
      use Try::Tiny;
      
      try {
          # Code that might fail
      } catch {
          # Handle error
          $self->logging->log_error($c, "Error occurred: $_");
          $c->stash(error => "An error occurred. Please try again.");
      };
  
  database:
    orm: "Use DBIx::Class for all database operations"
    schema_management: "[MANDATORY] Use DBSchemaManager.pm ONLY - never create .sql files"
    migrations: "Use DBSchemaManager methods programmatically"
    queries: "Use parameterized queries (DBIx::Class handles this automatically)"
    location: "/Comserv/lib/Comserv/Model/DBSchemaManager.pm"
  
  perl_style:
    best_practices: "Follow PBP (Perl Best Practices)"
    modern_perl: "Use Modern Perl style conventions"
    strict_warnings: "Always use: use strict; use warnings;"
    version_target: "Target Perl 5.40.0+ features"
    modules: "Use Module::Install for package management"

---

# ═══════════════════════════════════════════════════════════════════════════
# SECTION 6: TESTING STANDARDS
# ═══════════════════════════════════════════════════════════════════════════

testing:
  [SOURCE]: "guidelines.tt"
  [DUPLICATE]: "Similar testing guidelines appear in comserv-ai-guidelines-consolidated.yaml"
  
  framework: "Test::More (Perl standard testing framework)"
  additional_frameworks:
    - "Catalyst::Test (for controller testing)"
    - "Test::WWW::Mechanize::Catalyst (for integration testing)"
    - "Test::Exception (for exception testing)"
    - "Test::MockObject (for mocking)"
  
  test_types:
    unit_tests: "Test individual functions and methods in isolation"
    integration_tests: "Test how application components work together"
    template_tests: "Review .tt templates for syntax and verify variables are passed correctly"
    automated_tests: "Use testing frameworks to catch regressions early"
  
  test_suite:
    location: "/Comserv/t/"
    run_command: "perl -t or prove t/"
    requirements:
      - "Write tests alongside code changes"
      - "Run full suite after modifications"
      - "Verify all tests pass before completing task"
      - "Check for test coverage regressions"
  
  coverage_goal: "80%+ code coverage"
  
  template_testing_checklist:
    - "Review .tt templates for proper syntax"
    - "Ensure all necessary variables are passed from controller"
    - "Test with multiple theme settings"
    - "Verify responsive design on mobile"
    - "Check accessibility (heading hierarchy, ARIA labels)"

---

# ═══════════════════════════════════════════════════════════════════════════
# SECTION 7: DOCUMENTATION STANDARDS
