documentation_standards:
  [SOURCE]: "guidelines.tt + template files"
  [CONSOLIDATION]: "See TEMPLATE STANDARDS section for .tt file format requirements"
  
  principle: "Keep documentation up-to-date and comprehensive"
  sync_with_code: "Ensure all code changes are reflected in documentation sections"
  
  documentation_requirements:
    when_code_added:
      controller: "Create /Documentation/controllers/controller_name.tt"
      model: "Create /Documentation/models/model_name.tt"
      feature: "Create /Documentation/features/feature_name.tt"
      change: "Update existing documentation when modifying features"
    
    format_requirement: "ONLY Template Toolkit (.tt) format in /Documentation/"
    location_requirement: "All documentation goes in /Comserv/root/Documentation/"
    [ISSUE_MARKER_FORMAT]: "Ensure .tt format ONLY - no .md files should exist in /Documentation/"
  
  cross_referencing: "Code and documentation must reference each other for maintainability"

