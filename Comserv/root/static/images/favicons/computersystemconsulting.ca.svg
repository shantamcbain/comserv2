<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark navy bg — professional IT consulting -->
  <rect width="32" height="32" rx="4" fill="#0d2b52"/>
  <!-- Circuit-board trace lines -->
  <line x1="4" y1="8" x2="12" y2="8" stroke="#ccffff" stroke-width="1.2" opacity="0.6"/>
  <line x1="12" y1="8" x2="12" y2="4" stroke="#ccffff" stroke-width="1.2" opacity="0.6"/>
  <line x1="20" y1="8" x2="28" y2="8" stroke="#ccffff" stroke-width="1.2" opacity="0.6"/>
  <line x1="28" y1="8" x2="28" y2="4" stroke="#ccffff" stroke-width="1.2" opacity="0.6"/>
  <line x1="4" y1="24" x2="12" y2="24" stroke="#ccffff" stroke-width="1.2" opacity="0.6"/>
  <line x1="12" y1="24" x2="12" y2="28" stroke="#ccffff" stroke-width="1.2" opacity="0.6"/>
  <line x1="20" y1="24" x2="28" y2="24" stroke="#ccffff" stroke-width="1.2" opacity="0.6"/>
  <line x1="28" y1="24" x2="28" y2="28" stroke="#ccffff" stroke-width="1.2" opacity="0.6"/>
