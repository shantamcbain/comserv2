version: '3.9'

services:
  # Staging services - uses comserv2_* named volumes for consistency
  config-db:
    image: mariadb:10.11
    container_name: comserv2-config-db-staging
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-stagingroot}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-comserv_staging}
      MARIADB_USER: ${MARIADB_USER:-comserv}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-stagingpass}
    volumes:
      - comserv2_config_db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: comserv2-redis-staging
    restart: unless-stopped
    volumes:
      - comserv2_redis_data:/data

  web-staging:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comserv-web-staging
    restart: unless-stopped
    labels:
      - "description=Staging web server for pre-production testing and validation"
    environment:
      CATALYST_ENV: staging
      CATALYST_DEBUG: 0
      WEB_PORT: 5000
      TZ: UTC
      DISABLE_HEALTH_MONITOR: "1"
      # Database configuration for staging
      DB_HOST: ${DB_HOST_STAGING:-db-staging.example.com}
      DB_PORT: ${DB_PORT_STAGING:-3306}
      DB_NAME: ${DB_NAME_STAGING:-comserv_staging}
      DB_USER: ${DB_USER_STAGING:-comserv}
      DB_PASS: ${DB_PASS_STAGING}
    ports:
      - "5000:5000"
    networks:
      comserv-staging-network:
        ipv4_address: 172.21.0.2
    volumes:
      # Source code (read-only in staging)
      - ./lib:/opt/comserv/lib:ro
      - ./script:/opt/comserv/script:ro
      - ./root:/opt/comserv/root:ro
      - ./config:/opt/comserv/config:ro
      - ./t:/opt/comserv/t:ro
      # Config (read-only)
      - ./db_config.json:/opt/comserv/db_config.json:ro
      # Standardized comserv2_* named volumes
      - comserv2_logs:/opt/comserv/root/log
      - comserv2_sessions:/opt/comserv/root/session
      - comserv2_workshop_files:/opt/comserv/backups
      - comserv2_whisper_venv:/opt/comserv/whisper_venv
      - comserv2_cpan_cache:/root/.cpan
      - comserv2_cache:/cache
      - comserv2_temp:/tmp/comserv/temp
      - comserv2_themes:/opt/comserv/root/themes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    # Staging-specific resource limits for cost optimization
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

volumes:
  # Standardized comserv2_* named volumes (shared with prod/dev)
  comserv2_config_db_data:
    driver: local
  comserv2_redis_data:
    driver: local
  comserv2_logs:
    driver: local
  comserv2_sessions:
    driver: local
  comserv2_workshop_files:
    driver: local
  comserv2_whisper_venv:
    driver: local
  comserv2_cpan_cache:
    driver: local
  comserv2_temp:
    driver: local
  comserv2_themes:
    driver: local
  comserv2_cache:
    driver: local

networks:
  comserv-staging-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-comserv-staging
    ipam:
      config:
        - subnet: 172.21.0.0/16
          gateway: 172.21.0.1