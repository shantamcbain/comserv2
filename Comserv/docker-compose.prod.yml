services:
  web-prod:
    build:
      context: .
      dockerfile: Dockerfile
    image: shantamcsbain/comserv-web-prod:latest
    container_name: comserv-web-prod
    restart: unless-stopped
    environment:
      CATALYST_ENV: production
      CATALYST_DEBUG: 0
      WEB_PORT: 5000
      TZ: UTC
      NFS_DATA_PATH: /data/nfs
      COMSERV_SESSION_DIR: /tmp/comserv/session
      COMSERV_SESSION_COOKIE: comserv_session
      DB_HOST: ${DB_HOST:-192.168.1.198}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-ency}
      SYSTEM_IDENTIFIER: workstation-prod
    ports:
      - "5000:5000"
    volumes:
      - ~/.comserv/secrets:/home/comserv/.comserv/secrets:ro
      - /home/shanta/comserv-logs:/opt/comserv/root/log
      - /home/shanta/comserv-workshop:/data/nfs:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || curl -f http://127.0.0.1:5000/health || curl -g -6 -f http://[::1]:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
