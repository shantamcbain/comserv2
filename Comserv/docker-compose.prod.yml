

services:
  web-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comserv-web-prod
    restart: always
    environment:
      CATALYST_ENV: production
      CATALYST_DEBUG: 0
      WEB_PORT: 5000
      TZ: UTC
      # Production database configuration - Uses db_config.json priority system
      DB_HOST: ${DB_HOST_PROD:-192.168.1.198}
      DB_PORT: ${DB_PORT_PROD:-3306}
      DB_NAME: ${DB_NAME_PROD:-ency}
      DB_USER: ${DB_USER_PROD:-shanta_forager}
      DB_PASS: ${DB_PASS_PROD:-UA=nPF8*m+T#}
      # Production features
      ENABLE_MONITORING: 1
      ENABLE_LOGGING: 1
    ports:
      - "5000:5000"
    volumes:
      # Code is read-only in production
      - ./lib:/opt/comserv/lib:ro
      - ./script:/opt/comserv/script:ro
      - ./root:/opt/comserv/root:ro
      - ./config:/opt/comserv/config:ro
      - ./t:/opt/comserv/t:ro
      # Config (read-only)
      - ./db_config.json:/opt/comserv/db_config.json:ro
      # Persistent volumes for critical data
      - comserv-prod-logs:/opt/comserv/root/log
      - comserv-prod-sessions:/opt/comserv/root/session
      - comserv-prod-backups:/opt/comserv/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - comserv-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    # Production resource allocation
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
    # Extra hosts for multi-server setup (if needed)
    extra_hosts:
      - "db-prod.example.com:${DB_HOST_PROD_IP}"

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: comserv-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web-prod
    networks:
      - comserv-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # Optional: config-db service for dynamic DB connections (used by Phase 4+)
  config-db:
    image: mysql:8.0
    container_name: comserv-config-db
    environment:
      MYSQL_ROOT_PASSWORD: root_config_dev
      MYSQL_DATABASE: comserv_config
      MYSQL_USER: comserv_config
      MYSQL_PASSWORD: config_dev_password
    ports:
      - "3307:3306"
    volumes:
      - comserv-config-db-data:/var/lib/mysql
    networks:
      - comserv-network
    restart: unless-stopped

volumes:
  comserv-prod-logs:
    driver: local
  comserv-prod-sessions:
    driver: local
  comserv-prod-backups:
    driver: local

  # Data volume for config-db
  comserv-config-db-data:
    driver: local

networks:
  comserv-network:
    driver: bridge
