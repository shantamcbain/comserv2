services:
  config-db:
    image: mariadb:10.11
    container_name: comserv2-config-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-changeme}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-comserv}
      MARIADB_USER: ${MARIADB_USER:-comserv}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-changeme}
    volumes:
      - comserv2_config_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: comserv2-redis
    restart: unless-stopped
    volumes:
      - comserv2_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  web-prod:
    build:
      context: .
      dockerfile: Dockerfile
    image: shantamcsbain/comserv-web-prod:latest
    container_name: comserv-web-prod
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      PORT: 5000
      CATALYST_ENV: production
      CATALYST_DEBUG: 0
      WEB_PORT: 5000
      TZ: UTC
      COMSERV_NO_HEALTH_LOG: 1
      NFS_DATA_PATH: /data/nfs
      COMSERV_LOG_DIR: /opt/comserv/root/log
      DISABLE_FILE_LOGGING: "1"
      COMSERV_LOG_MIN_LEVEL: "WARN"
      DB_LOG_MIN_LEVEL: "WARN"
      COMSERV_SESSION_DIR: /tmp/comserv/session
      COMSERV_SESSION_COOKIE: comserv_session
      DB_HOST: ${DB_HOST:-192.168.1.198}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-ency}
      SYSTEM_IDENTIFIER: ${SYSTEM_IDENTIFIER:-workstation-prod-local}
    ports:
      - "5000:5000"
    volumes:
      - ~/.comserv/secrets:/home/comserv/.comserv/secrets:ro
      # New named volumes
      - comserv2_logs:/opt/comserv/root/log
      - comserv2_workshop_files:/data/nfs:rw
      - comserv2_sessions:/tmp/comserv/session:rw
      - comserv2_cache:/cache
      - comserv2_cache:/tmp/comserv/cache
      - comserv2_temp:/tmp/comserv/temp
      - comserv2_themes:/opt/comserv/root/themes
      - comserv2_whisper_venv:/opt/comserv/whisper_venv
      - comserv2_cpan_cache:/root/.cpan
      # Legacy bind mounts (keep or migrate)
      - /root/static:/opt/comserv/root/static
      - /root/LegacyStaticPages:/opt/comserv/root/LegacyStaticPages
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || curl -f http://127.0.0.1:5000/health || curl -g -6 -f http://[::1]:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  # Core persistent data
  comserv2_config_db_data:     # MariaDB / MySQL
  comserv2_redis_data:
  comserv2_logs:               # Application logs
  comserv2_sessions:
  comserv2_workshop_files:     # NFS-backed or local for uploads/workshops
  comserv2_whisper_venv:       # Shared across envs
  comserv2_cpan_cache:         # Perl dependencies

  # Optional / dev-only
  comserv2_temp:
  comserv2_themes:
  comserv2_cache:
