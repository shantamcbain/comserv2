<Plugin::Authentication>
    default_realm   default
    <realms>
        <default>
            <credential>
                class Password
                password_field password
                password_type  self_check
            </credential>
            <store>
                class DBIx::Class
                user_model     DBEncy.User
                role_relation  roles
                role_field     rolename
            </store>
        </default>
    </realms>
</Plugin::Authentication>

# Virtualmin API configuration
<Virtualmin>
    host        192.168.1.129
    username    admin
    password    your_secure_password  # Replace with actual password in production
</Virtualmin>

# Fallback SMTP configuration — used when no site_config SMTP entries are found
# Configure per-site SMTP via Admin > Mail > SMTP Settings
<FallbackSMTP>
    host        harper.whc.ca
    port        465
    ssl         ssl
    username    
    password    
    from        
</FallbackSMTP>

# Ollama LLM server configuration
# Change host/fallback_host here — this is the ONLY place to set Ollama addresses.
# If localhost and fallback_host are the same machine, set them identically.
<Ollama>
    host          192.168.1.199
    fallback_host 192.168.1.199
    port          11434
</Ollama>

# Workshop file uploads directory (NFS mount)
workshop_upload_dir /data/nfs
# workshop_upload_dir /home/shanta/nfs
# workshop_upload_dir /data/apis/workshop_files

# PayPal Standard Payment configuration
# Set sandbox=1 during testing, 0 for live payments
<PayPal>
    sandbox         1
    business        paypal@computersystemconsulting.ca
    currency_code   CAD
</PayPal>

# rename this file to comserv.yml and put a ':' after 'name' if
# you want to use YAML like in old versions of Catalyst
name Comserv
