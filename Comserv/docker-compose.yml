# =============================================================================
# COMSERV DOCKER COMPOSE - STANDARDIZED VOLUME STRATEGY (comserv2_* prefix)
# =============================================================================
#
# Volume naming convention (ALL environments use these exact names):
#   comserv2_config_db_data   - MariaDB/MySQL data
#   comserv2_redis_data       - Redis persistence
#   comserv2_logs             - Application logs
#   comserv2_sessions         - Session storage
#   comserv2_workshop_files   - Workshop/uploads (NFS or local)
#   comserv2_whisper_venv     - Whisper Python venv (shared)
#   comserv2_cpan_cache       - Perl CPAN cache
#   comserv2_temp             - Temporary files
#   comserv2_themes           - Custom themes
#   comserv2_cache            - Application cache
#
# Environment differences:
#   - Workstation (this file): all volumes use local driver
#   - Production: use docker-compose.prod.yml + docker-compose.prod.nfs.yml
#     (NFS driver for data volumes, local for cache/temp)
#   - Dev/Staging: inherit from this file or override as needed
#
# Migration from legacy comserv_* volumes:
#   Old volumes (comserv_cache, comserv-temp, comserv-themes, etc.) are
#   deprecated. Use the migration commands in deploy.sh before first prod deploy.
#
# Usage:
#   Workstation: docker compose up -d
#   Production:  docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#                -f docker-compose.prod.nfs.yml up -d
# =============================================================================

services:
  config-db:
    image: mariadb:10.11
    container_name: comserv2-config-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-changeme}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-comserv}
      MARIADB_USER: ${MARIADB_USER:-comserv}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-changeme}
    volumes:
      - comserv2_config_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: comserv2-redis
    restart: unless-stopped
    volumes:
      - comserv2_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: shantamcsbain/comserv-web-prod:latest
    container_name: comserv2-web
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      PORT: 5000
      CATALYST_ENV: ${CATALYST_ENV:-production}
      CATALYST_DEBUG: ${CATALYST_DEBUG:-0}
      WEB_PORT: 5000
      TZ: UTC
      NFS_DATA_PATH: /data/nfs
      COMSERV_LOG_DIR: /opt/comserv/root/log
    ports:
      - "5000:5000"
    volumes:
      - ~/.comserv/secrets:/home/comserv/.comserv/secrets:ro
      - comserv2_logs:/opt/comserv/root/log
      - comserv2_workshop_files:/data/nfs:rw
      - comserv2_sessions:/tmp/comserv/session:rw
      - comserv2_whisper_venv:/opt/comserv/whisper_venv
      - comserv2_cpan_cache:/root/.cpan
      - comserv2_cache:/cache
      - comserv2_temp:/tmp/comserv/temp
      - comserv2_themes:/opt/comserv/root/themes
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || curl -f http://127.0.0.1:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  web-staging:
    build:
      context: .
      dockerfile: Dockerfile
    image: shantamcsbain/comserv-web-prod:latest
    container_name: comserv2-web-staging
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-staging}
      PORT: 3000
      CATALYST_ENV: ${CATALYST_ENV:-staging}
      CATALYST_DEBUG: ${CATALYST_DEBUG:-0}
      WEB_PORT: 3000
      TZ: UTC
      NFS_DATA_PATH: /data/nfs
      COMSERV_LOG_DIR: /opt/comserv/root/log
    ports:
      - "4000:3000"
    volumes:
      - ~/.comserv/secrets:/home/comserv/.comserv/secrets:ro
      - comserv2_logs:/opt/comserv/root/log
      - comserv2_workshop_files:/data/nfs:rw
      - comserv2_whisper_venv:/opt/comserv/whisper_venv
      - comserv2_cpan_cache:/root/.cpan
      - comserv2_cache:/cache
      - comserv2_temp:/tmp/comserv/temp
      - comserv2_themes:/opt/comserv/root/themes
      - comserv-static:/opt/comserv/root/static:rw
      - comserv-cache:/opt/comserv/root/cache:rw
      - comserv-userprefs:/opt/comserv/root/userprefs:rw
      - comserv-sessions:/opt/comserv/root/sessions:rw
    command: ["starman", "--listen", ":3000", "--workers", "4", "--preload-app", "script/comserv_server.pl"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || curl -f http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  comserv2_config_db_data:
    driver: local
  comserv2_redis_data:
    driver: local
  comserv2_logs:
    driver: local
  comserv2_sessions:
    driver: local
  comserv2_workshop_files:
    driver: local
  comserv2_whisper_venv:
    driver: local
  comserv2_cpan_cache:
    driver: local
  comserv2_temp:
    driver: local
  comserv2_themes:
    driver: local
  comserv2_cache:
    driver: local
  comserv-static:
    driver: local
  comserv-cache:
    driver: local
  comserv-userprefs:
    driver: local
  comserv-sessions:
    driver: local
