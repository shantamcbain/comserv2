services:
  # Development services - uses comserv2_* named volumes for consistency
  config-db:
    image: mariadb:10.11
    container_name: comserv2-config-db-dev
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-devroot}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-comserv_dev}
      MARIADB_USER: ${MARIADB_USER:-comserv}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-devpass}
    volumes:
      - comserv2_config_db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: comserv2-redis-dev
    restart: unless-stopped
    volumes:
      - comserv2_redis_data:/data

  web-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: comserv-web-dev:latest
    container_name: comserv-web-dev
    restart: always
    labels:
      - "description=Development web server with hot reload and debugging support"
    environment:
      CATALYST_ENV: development
      CATALYST_DEBUG: 1
      WEB_PORT: 3000
      SYSTEM_IDENTIFIER: "docker-dev"
      TZ: UTC
      DISABLE_HEALTH_MONITOR: "1"
      # Set in .env file: CATALYST_SERVER_IP=192.168.1.199  (host LAN IP, shown in admin bar)
      CATALYST_SERVER_IP: "${CATALYST_SERVER_IP}"
      # NFS resource library path. Dev: local dir; Prod: /data/apis (NFS mount)
      NFS_DATA_PATH: "${NFS_DATA_PATH:-/opt/comserv/workshop_resources}"
      TTYD_HOST_PORT: "7682"
      # Database credentials from K8s Secrets or .env file (gitignored)
      # Load from: kubernetes secrets -> environment variables -> .env file (local dev)
      # Never use hardcoded defaults in this file - require explicit configuration
      COMSERV_DB_PRODUCTION_SERVER_HOST: "${COMSERV_DB_PRODUCTION_SERVER_HOST}"
      COMSERV_DB_PRODUCTION_SERVER_PORT: "${COMSERV_DB_PRODUCTION_SERVER_PORT:-3306}"
      COMSERV_DB_PRODUCTION_SERVER_USERNAME: "${COMSERV_DB_PRODUCTION_SERVER_USERNAME}"
      COMSERV_DB_PRODUCTION_SERVER_PASSWORD: "${COMSERV_DB_PRODUCTION_SERVER_PASSWORD}"
      COMSERV_DB_PRODUCTION_SERVER_DATABASE: "${COMSERV_DB_PRODUCTION_SERVER_DATABASE:-ency}"
      COMSERV_DB_PRODUCTION_FORAGER_HOST: "${COMSERV_DB_PRODUCTION_FORAGER_HOST}"
      COMSERV_DB_PRODUCTION_FORAGER_PORT: "${COMSERV_DB_PRODUCTION_FORAGER_PORT:-3306}"
      COMSERV_DB_PRODUCTION_FORAGER_USERNAME: "${COMSERV_DB_PRODUCTION_FORAGER_USERNAME}"
      COMSERV_DB_PRODUCTION_FORAGER_PASSWORD: "${COMSERV_DB_PRODUCTION_FORAGER_PASSWORD}"
      COMSERV_DB_PRODUCTION_FORAGER_DATABASE: "${COMSERV_DB_PRODUCTION_FORAGER_DATABASE:-shanta_forager}"
      RUNNING_IN_DOCKER: "docker"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Core comserv2_* named volumes (standardized across all environments)
      - comserv2_logs:/opt/comserv/root/log
      - comserv2_workshop_files:/opt/comserv/workshop_resources
      - comserv2_sessions:/tmp/comserv/session
      - comserv2_whisper_venv:/opt/comserv/whisper_venv
      - comserv2_cpan_cache:/root/.cpan
      - comserv2_cache:/cache
      - comserv2_temp:/tmp/comserv/temp
      - comserv2_themes:/opt/comserv/root/themes
      # Source code for hot reload during development
      - ./lib:/opt/comserv/lib:delegated
      - ./script:/opt/comserv/script:delegated
      - ./root:/opt/comserv/root:delegated
      - ./config:/opt/comserv/config:delegated
      - ./t:/opt/comserv/t:delegated
      # Shared with host for ttyd start requests + log status (Docker cannot see host :7682)
      - ./var:/opt/comserv/var:delegated
      # Config (read-only)
      - ./db_config.json:/opt/comserv/db_config.json:ro
      # Secrets for database connection (read-only)
      - ~/.comserv/secrets:/home/comserv/.comserv/secrets:ro
      # Override entrypoint to fix permission errors without rebuild
      - ./docker-entrypoint-dev.sh:/opt/comserv/docker-entrypoint.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  # Standardized comserv2_* named volumes (shared with prod/staging)
  comserv2_config_db_data:
    driver: local
  comserv2_redis_data:
    driver: local
  comserv2_logs:
    driver: local
  comserv2_sessions:
    driver: local
  comserv2_workshop_files:
    driver: local
  comserv2_whisper_venv:
    driver: local
  comserv2_cpan_cache:
    driver: local
  comserv2_temp:
    driver: local
  comserv2_themes:
    driver: local
  comserv2_cache:
    driver: local
