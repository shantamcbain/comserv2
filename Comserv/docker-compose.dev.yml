services:
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comserv-web-dev
    restart: always
    labels:
      - "description=Development web server with hot reload and debugging support"
    environment:
      CATALYST_ENV: development
      CATALYST_DEBUG: 1
      WEB_PORT: 3000
      TZ: UTC
      COMSERV_DB_PRODUCTION_SERVER_HOST: "${COMSERV_DB_PRODUCTION_SERVER_HOST:-192.168.1.198}"
      COMSERV_DB_PRODUCTION_SERVER_PORT: "${COMSERV_DB_PRODUCTION_SERVER_PORT:-3306}"
      COMSERV_DB_PRODUCTION_SERVER_USERNAME: "${COMSERV_DB_PRODUCTION_SERVER_USERNAME:-shanta_forager}"
      COMSERV_DB_PRODUCTION_SERVER_PASSWORD: "${COMSERV_DB_PRODUCTION_SERVER_PASSWORD:-UA=nPF8*m+T#}"
      COMSERV_DB_PRODUCTION_SERVER_DATABASE: "${COMSERV_DB_PRODUCTION_SERVER_DATABASE:-ency}"
      COMSERV_DB_PRODUCTION_FORAGER_HOST: "${COMSERV_DB_PRODUCTION_FORAGER_HOST:-192.168.1.198}"
      COMSERV_DB_PRODUCTION_FORAGER_PORT: "${COMSERV_DB_PRODUCTION_FORAGER_PORT:-3306}"
      COMSERV_DB_PRODUCTION_FORAGER_USERNAME: "${COMSERV_DB_PRODUCTION_FORAGER_USERNAME:-shanta_forager}"
      COMSERV_DB_PRODUCTION_FORAGER_PASSWORD: "${COMSERV_DB_PRODUCTION_FORAGER_PASSWORD:-UA=nPF8*m+T#}"
      COMSERV_DB_PRODUCTION_FORAGER_DATABASE: "${COMSERV_DB_PRODUCTION_FORAGER_DATABASE:-shanta_forager}"
    volumes:
      # Source code for hot reload during development
      - ./lib:/opt/comserv/lib:delegated
      - ./script:/opt/comserv/script:delegated
      - ./root:/opt/comserv/root:delegated
      - ./config:/opt/comserv/config:delegated
      - ./t:/opt/comserv/t:delegated
      # Config (read-only)
      - ./db_config.json:/opt/comserv/db_config.json:ro
      # Override entrypoint to fix permission errors without rebuild
      - ./docker-entrypoint-dev.sh:/opt/comserv/docker-entrypoint.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
