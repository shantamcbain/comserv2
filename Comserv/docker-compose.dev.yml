version: '3.9'

services:
  web-dev:
    image: ghcr.io/${{ secrets.IMAGE_REGISTRY }}/comserv:develop
    container_name: comserv-web-dev
    restart: unless-stopped
    environment:
      CATALYST_ENV: development
      CATALYST_DEBUG: 1
      WEB_PORT: 3000
      TZ: UTC
      # Database (shared across environments - consider per-env in future)
      DB_HOST: ${DB_HOST:-db.example.com}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-comserv_dev}
      DB_USER: ${DB_USER:-comserv}
      DB_PASS: ${DB_PASS}
    ports:
      - "3000:3000"
    volumes:
      # Source code for hot reload during development
      - ./lib:/opt/comserv/lib:delegated
      - ./script:/opt/comserv/script:delegated
      - ./root:/opt/comserv/root:delegated
      - ./config:/opt/comserv/config:delegated
      - ./t:/opt/comserv/t:delegated
      # Config (read-only)
      - ./db_config.json:/opt/comserv/db_config.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - comserv-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  comserv-network:
    driver: bridge