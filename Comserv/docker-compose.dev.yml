

services:
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comserv-web-dev
    restart: unless-stopped
    environment:
      CATALYST_ENV: development
      CATALYST_DEBUG: 1
      WEB_PORT: 3000
      TZ: UTC
      # Database - Uses db_config.json priority system (production server is Priority 1)
      DB_HOST: ${DB_HOST:-192.168.1.198}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-ency}
      DB_USER: ${DB_USER:-shanta_forager}
      DB_PASS: ${DB_PASS:-UA=nPF8*m+T#}
    ports:
      - "3000:3000"
    volumes:
      # Source code for hot reload during development
      - ./lib:/opt/comserv/lib:delegated
      - ./script:/opt/comserv/script:delegated
      - ./root:/opt/comserv/root:delegated
      - ./config:/opt/comserv/config:delegated
      - ./t:/opt/comserv/t:delegated
      # Config (read-only)
      - ./db_config.json:/opt/comserv/db_config.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - comserv-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  comserv-network:
    driver: bridge