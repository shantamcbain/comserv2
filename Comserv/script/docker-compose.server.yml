services:
  web-prod:
    image: shantamcsbain/comserv-web-prod:latest
    container_name: comserv2-web-prod
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      CATALYST_ENV: production
      CATALYST_DEBUG: 0
      WEB_PORT: 5000
      TZ: UTC
      NFS_DATA_PATH: /data/nfs
      COMSERV_SESSION_DIR: /tmp/comserv/session
      COMSERV_SESSION_COOKIE: comserv_session
      SYSTEM_IDENTIFIER: ${SYSTEM_IDENTIFIER:-production1}
    volumes:
      - /home/ubuntu/.comserv/secrets:/home/comserv/.comserv/secrets:ro
      - ${COMSERV_LOGS_DIR:-/var/log/comserv}:/opt/comserv/root/log
      - ${NFS_DATA_DIR:-/var/lib/comserv/data}:/data/nfs:rw
      - whisper-venv:/opt/comserv/whisper_venv:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || curl -f http://127.0.0.1:5000/health || curl -g -6 -f http://[::1]:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

volumes:
  whisper-venv:
    driver: local
