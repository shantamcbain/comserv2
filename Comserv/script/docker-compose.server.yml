services:
  web-prod:
    image: shantamcsbain/comserv-web-prod:latest
    container_name: comserv2-web-prod
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      CATALYST_ENV: production
      CATALYST_DEBUG: 0
      WEB_PORT: 5000
      TZ: UTC
      COMSERV_NO_HEALTH_LOG: 1
      NFS_DATA_PATH: /data/nfs
      WORKSHOP_RESOURCES_PATH: /data/nfs
      NFS_ROOT: /data/nfs
      COMSERV_LOG_DIR: /opt/comserv/applogs
      DISABLE_FILE_LOGGING: "1"
      COMSERV_LOG_MIN_LEVEL: "WARN"
      DB_LOG_MIN_LEVEL: "WARN"
      COMSERV_SESSION_DIR: /tmp/comserv/session
      COMSERV_SESSION_COOKIE: comserv_session
      SYSTEM_IDENTIFIER: ${SYSTEM_IDENTIFIER:-production1}
    volumes:
      - /home/ubuntu/.comserv/secrets:/home/comserv/.comserv/secrets:ro
      - ${COMSERV_LOGS_DIR:-/var/log/comserv}:/opt/comserv/applogs
      - ${WORKSHOP_LOCAL_DIR:-/var/lib/comserv/data}:/data/nfs:rw
      - /home/ubuntu/comserv-sessions:/tmp/comserv/session:rw
      - whisper-venv:/opt/comserv/whisper_venv:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || curl -f http://127.0.0.1:5000/health || curl -g -6 -f http://[::1]:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  whisper-venv:
    driver: local
