services:
  web-prod:
    image: shantamcsbain/comserv-web-prod:latest
    container_name: comserv2-web-prod
    restart: unless-stopped
    ports:
      - "5000:3000"
    environment:
      CATALYST_ENV: production
      CATALYST_DEBUG: 0
      WEB_PORT: 3000
      TZ: UTC
      NFS_DATA_PATH: /data/nfs
      DISABLE_FILE_LOGGING: "1"
      COMSERV_LOG_MIN_LEVEL: "WARN"
      DB_LOG_MIN_LEVEL: "WARN"
      COMSERV_SESSION_DIR: /tmp/comserv/session
      COMSERV_SESSION_COOKIE: comserv_session
    volumes:
      - /home/ubuntu/.comserv/secrets:/home/comserv/.comserv/secrets:ro
      - ${COMSERV_LOGS_DIR:-/var/log/comserv}:/opt/comserv/root/log
      - ${NFS_DATA_DIR:-/var/lib/comserv/data}:/data/nfs:rw
      - whisper-venv:/opt/comserv/whisper_venv:rw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  whisper-venv:
    driver: local
