# Workstation Apache → Starman :3001 (preserves Host: for SiteName resolution).
# HTTP  : script/install_apache_comserv_proxy.sh
# HTTPS : script/dev_tls_install.sh  (private CA — ZeroTier dev.* via /etc/hosts)

<VirtualHost *:80>
    ServerAdmin webmaster@localhost

    ProxyPreserveHost On
    ProxyTimeout 900
    ProxyPass / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    ErrorLog ${APACHE_LOG_DIR}/comserv-dev-error.log
    CustomLog ${APACHE_LOG_DIR}/comserv-dev-access.log combined
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerAdmin webmaster@localhost

    SSLEngine on
    Include conf-available/comserv-dev-ssl-paths.conf

    ProxyPreserveHost On
    ProxyTimeout 900
    RequestHeader set X-Forwarded-Proto "https"
    ProxyPass / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    ErrorLog ${APACHE_LOG_DIR}/comserv-dev-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/comserv-dev-ssl-access.log combined
</VirtualHost>
</IfModule>