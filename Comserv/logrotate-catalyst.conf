# Logrotate configuration for Comserv Catalyst application logs
# Prevents disk space exhaustion from unbounded log growth

/opt/comserv/root/log/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    maxsize 100M
    create 0644 comserv comserv
    sharedscripts
    postrotate
        # Signal supervisor to reopen log files if needed
        supervisorctl status > /dev/null 2>&1 || true
    endscript
}

/opt/comserv/root/Documentation/session_history/*.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    maxsize 50M
    create 0644 comserv comserv
}

/opt/comserv/logs/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    maxsize 50M
    create 0644 comserv comserv
}
