# Logrotate configuration for Comserv Catalyst application logs
# Prevents disk space exhaustion from unbounded log growth
#
# Strategy:
#   - Live log writes go to LOCAL filesystem (logs/application.log in each worktree/install)
#   - On rotation, the compressed archive is copied to NFS for centralised long-term storage
#   - NFS is NEVER written during normal log writes — only during archival (postrotate)

# --- Production Docker install ---
/opt/comserv/root/log/*.log {
    su comserv comserv
    daily
    dateext
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    maxsize 100M
    create 0644 comserv comserv
    sharedscripts
    postrotate
        supervisorctl status > /dev/null 2>&1 || true
        NFS_ARCHIVE=/data/nfs/logs/archive
        [ -d "/data/nfs" ] || NFS_ARCHIVE=/home/shanta/nfs/logs/archive
        [ -d "$NFS_ARCHIVE" ] || mkdir -p "$NFS_ARCHIVE" 2>/dev/null || true
        find /opt/comserv/root/log -name "*.log-*.gz" -mmin -5 \
            -exec cp -p {} "$NFS_ARCHIVE/" \; 2>/dev/null || true
    endscript
}

/opt/comserv/root/Documentation/session_history/*.log {
    su comserv comserv
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    maxsize 50M
    create 0644 comserv comserv
}

/opt/comserv/logs/*.log {
    su comserv comserv
    daily
    dateext
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    maxsize 50M
    create 0644 comserv comserv
    postrotate
        NFS_ARCHIVE=/data/nfs/logs/archive
        [ -d "/data/nfs" ] || NFS_ARCHIVE=/home/shanta/nfs/logs/archive
        [ -d "$NFS_ARCHIVE" ] || mkdir -p "$NFS_ARCHIVE" 2>/dev/null || true
        find /opt/comserv/logs -name "*.log-*.gz" -mmin -5 \
            -exec cp -p {} "$NFS_ARCHIVE/" \; 2>/dev/null || true
    endscript
}

# --- Worktree installs (dev/feature branches under ~/.zenflow/worktrees) ---
# Each worktree writes locally to its own logs/ directory.
# Rotation keeps 3 days locally; compressed archives are copied to NFS.
/home/shanta/.zenflow/worktrees/*/Comserv/logs/application.log {
    su shanta shanta
    daily
    dateext
    rotate 3
    compress
    delaycompress
    missingok
    notifempty
    maxsize 50M
    create 0644 shanta shanta
    sharedscripts
    postrotate
        NFS_ARCHIVE=/data/nfs/logs/archive
        [ -d "/data/nfs" ] || NFS_ARCHIVE=/home/shanta/nfs/logs/archive
        [ -d "$NFS_ARCHIVE" ] || mkdir -p "$NFS_ARCHIVE" 2>/dev/null || true
        find /home/shanta/.zenflow/worktrees -path "*/Comserv/logs/application.log-*.gz" -mmin -5 \
            -exec cp -p {} "$NFS_ARCHIVE/" \; 2>/dev/null || true
    endscript
}
