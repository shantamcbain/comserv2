version: '3.9'

services:
  web-dev:
    build:
      context: ./Comserv
      dockerfile: Dockerfile
    container_name: comserv-web-dev
    restart: unless-stopped
    environment:
      CATALYST_ENV: development
      CATALYST_DEBUG: 1
      CATALYST_HOME: /opt/comserv
      WEB_PORT: 3000
      TZ: ${TZ:-UTC}
    ports:
      - "3000:3000"
    volumes:
      # Mount source code directories only (not Docker-built artifacts)
      - ${APP_MOUNT:-.}/Comserv/lib:/opt/comserv/lib:delegated
      - ${APP_MOUNT:-.}/Comserv/script:/opt/comserv/script:delegated
      - ${APP_MOUNT:-.}/Comserv/root:/opt/comserv/root:delegated
      - ${APP_MOUNT:-.}/Comserv/config:/opt/comserv/config:delegated
      - ${APP_MOUNT:-.}/Comserv/t:/opt/comserv/t:delegated
      # Mount configuration as read-only
      - ./Comserv/db_config.json:/opt/comserv/db_config.json:ro
      # Preserve Docker-built artifacts: local (Starman, Perl modules), backups
      # These are created during build and NOT overridden by host mounts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web-prod:
    build:
      context: ./Comserv
      dockerfile: Dockerfile
    container_name: comserv-web-prod
    restart: unless-stopped
    environment:
      CATALYST_ENV: production
      CATALYST_DEBUG: 0
      CATALYST_HOME: /opt/comserv
      WEB_PORT: 5000
      TZ: ${TZ:-UTC}
    ports:
      - "5000:5000"
    volumes:
      # Mount source code directories only (not Docker-built artifacts)
      - ${APP_MOUNT:-.}/Comserv/lib:/opt/comserv/lib:delegated
      - ${APP_MOUNT:-.}/Comserv/script:/opt/comserv/script:delegated
      - ${APP_MOUNT:-.}/Comserv/root:/opt/comserv/root:delegated
      - ${APP_MOUNT:-.}/Comserv/config:/opt/comserv/config:delegated
      - ${APP_MOUNT:-.}/Comserv/t:/opt/comserv/t:delegated
      # Mount configuration as read-only
      - ./Comserv/db_config.json:/opt/comserv/db_config.json:ro
      # Preserve Docker-built artifacts: local (Starman, Perl modules), backups
      # These are created during build and NOT overridden by host mounts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
