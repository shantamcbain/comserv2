version: '3.8'

services:
  # ────────────────────────────────────────────────────────────────────────────
  # MariaDB Database Service
  # ────────────────────────────────────────────────────────────────────────────
  db:
    image: mariadb:10.11
    container_name: comserv2-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ency}
      MYSQL_USER: ${MYSQL_USER:-comserv}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-comserv}
      TZ: UTC
    volumes:
      - db-data:/var/lib/mysql
      - ./Comserv/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    networks:
      - comserv-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ────────────────────────────────────────────────────────────────────────────
  # Comserv Web Application (Development)
  # ────────────────────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: comserv-web:dev
    container_name: comserv2-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      CATALYST_ENV: development
      CATALYST_DEBUG: 1
      WEB_PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-ency}
      DB_USER: ${MYSQL_USER:-comserv}
      DB_PASSWORD: ${MYSQL_PASSWORD:-comserv}
      TZ: UTC
      NFS_DATA_PATH: ${NFS_DATA_PATH:-/data/nfs}
      NFS_HOST_PATH: "${NFS_HOST_PATH:-/home/shanta/nfs}"
      DISABLE_HEALTH_MONITOR: "1"
      COMSERV_SESSION_DIR: /tmp/comserv/session
      COMSERV_SESSION_COOKIE: comserv_session_dev
      PERL5LIB: /opt/comserv/lib:/opt/comserv/local/lib/perl5
      PATH: /opt/comserv/local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ./Comserv:/opt/comserv:rw
      - cpan-cache:/opt/comserv/local:rw
      # K8s parity: Secret volumeMount at /home/comserv/.comserv/secrets in-cluster.
      # Host path injected via COMSERV_SECRETS_DIR for remote deploys.
      - ${COMSERV_SECRETS_DIR:-/home/shanta/.comserv/secrets}:/home/comserv/.comserv/secrets:ro
      - ${NFS_HOST_PATH:-/home/shanta/nfs}:/data/nfs:rw
      - whisper-venv:/opt/comserv/whisper_venv:rw
    networks:
      - comserv-network
    working_dir: /opt/comserv
    command: >
      bash -c "
        echo '=== Starting Comserv Development Server ===' &&
        echo 'Perl version:' && perl -v | grep 'This is perl' &&
        echo 'PERL5LIB: $PERL5LIB' &&
        echo 'Checking dependencies...' &&
        carton check 2>/dev/null || carton install --deployment &&
        echo 'Starting Catalyst development server on port 3000...' &&
        carton exec -- plackup -s Starman \
          --port 3000 \
          --workers 4 \
          --max-requests 1000 \
          --access-log /opt/comserv/root/log/access.log \
          --error-log /opt/comserv/root/log/error.log \
          script/comserv.psgi
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ────────────────────────────────────────────────────────────────────────────
  # Comserv Web Application (Production-like)
  # ────────────────────────────────────────────────────────────────────────────
  web-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: comserv-web:prod
    container_name: comserv2-web-prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:3000"
    environment:
      CATALYST_ENV: production
      CATALYST_DEBUG: 0
      WEB_PORT: 5000
      CATALYST_HOME: /opt/comserv
      SYSTEM_IDENTIFIER: "${SYSTEM_IDENTIFIER:-production-prod}"
      WORKSHOP_RESOURCES_PATH: ${WORKSHOP_RESOURCES_PATH:-/data/nfs}
      COMSERV_HOST_NFS_PATH: "${WORKSHOP_LOCAL_DIR:-/home/shanta/nfs}"
      NFS_DATA_PATH: ${NFS_DATA_PATH:-/data/nfs}
      NFS_HOST_PATH: "${NFS_HOST_PATH:-/home/shanta/nfs}"
      SKIP_NFS_SETUP: 0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass_dev}
      TZ: ${TZ:-UTC}
      STARMAN_WORKERS: ${STARMAN_WORKERS:-5}
      COMSERV_LOG_MIN_LEVEL: ${COMSERV_LOG_MIN_LEVEL:-WARN}
      DB_LOG_MIN_LEVEL: ${DB_LOG_MIN_LEVEL:-WARN}
      # External Database Configuration (192.168.1.198) - credentials via K8s secrets (~/.comserv/secrets)
      DB_LOAD_SOURCE: db_config
      ACTIVE_DB_ENVIRONMENT: ${ACTIVE_DB_ENVIRONMENT:-production}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-ency}
      DB_USER: ${DB_USER:-comserv}
      DB_PASSWORD: ${DB_PASSWORD:-comserv}
      COMSERV_SESSION_DIR: /tmp/comserv/session
      COMSERV_SESSION_COOKIE: comserv_session
      PERL5LIB: /opt/comserv/lib:/opt/comserv/local/lib/perl5
      PATH: /opt/comserv/local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ./Comserv:/opt/comserv:ro
      - cpan-cache:/opt/comserv/local:rw
      # K8s parity: in-cluster this becomes a Secret volumeMount at the same
      # container path (/home/comserv/.comserv/secrets, mode 0400). The host
      # path is injected via COMSERV_SECRETS_DIR so remote deploys can point at
      # the copy synced into the compose project dir (see DockerDeploy.pm).
      - ${COMSERV_SECRETS_DIR:-/home/shanta/.comserv/secrets}:/home/comserv/.comserv/secrets:ro
      - ${NFS_HOST_PATH:-/home/shanta/nfs}:/data/nfs:rw
      - whisper-venv:/opt/comserv/whisper_venv:rw
    networks:
      - comserv-network
    working_dir: /opt/comserv
    command: >
      bash -c "
        echo '=== Starting Comserv Production Server ===' &&
        carton exec -- plackup -s Starman \
          --port 3000 \
          --workers 8 \
          --max-requests 5000 \
          --access-log /opt/comserv/root/log/access.log \
          --error-log /opt/comserv/root/log/error.log \
          script/comserv.psgi
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ────────────────────────────────────────────────────────────────────────────
  # phpMyAdmin (Database Management)
  # ────────────────────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: comserv2-phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER:-comserv}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-comserv}
      UPLOAD_LIMIT: 100M
    networks:
      - comserv-network

networks:
  comserv-network:
    driver: bridge

volumes:
  db-data:
    driver: local
  cpan-cache:
    driver: local
  whisper-venv:
    driver: local
