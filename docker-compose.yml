version: '3.9'

# Comserv Complete Infrastructure as Code
# Supports multiple environments: development, staging, production

services:
  # ===================================================================
  # MySQL Database Service
  # ===================================================================
  database:
    image: mysql:8.0-debian
    container_name: comserv-mysql
    restart: unless-stopped
    environment:
      # Database Configuration
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-comserv}
      MYSQL_USER: ${DB_USER:-comserv}
      MYSQL_PASSWORD: ${DB_PASSWORD:-comserv_pass}
      # MySQL configuration
      TZ: ${TZ:-UTC}
    ports:
      # Expose MySQL only on localhost by default (override in .env for remote access)
      - "${DB_HOST_PORT:-127.0.0.1:3306}:3306"
    volumes:
      # Database persistence
      - mysql_data:/var/lib/mysql
      # Custom MySQL configuration
      - ./config/mysql.cnf:/etc/mysql/conf.d/custom.cnf:ro
      # Initialization scripts
      - ./Comserv/sql:/docker-entrypoint-initdb.d:ro
    networks:
      - comserv_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USER:-comserv}", "-p${DB_PASSWORD:-comserv_pass}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE

  # ===================================================================
  # Redis Cache Service (Optional but recommended for sessions)
  # ===================================================================
  redis:
    image: redis:7-alpine
    container_name: comserv-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-127.0.0.1:6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - comserv_network
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redispass}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ===================================================================
  # Comserv Catalyst Application Service
  # ===================================================================
  web:
    build:
      context: ./Comserv
      dockerfile: Dockerfile
      args:
        PERL_VERSION: "5.40.0"
        BASE_IMAGE: "perl:5.40.0"
    container_name: comserv-web
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database Configuration
      DB_HOST: ${DB_HOST:-database}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-comserv}
      DB_USER: ${DB_USER:-comserv}
      DB_PASSWORD: ${DB_PASSWORD:-comserv_pass}
      
      # Redis Configuration
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      
      # Application Configuration
      CATALYST_ENV: ${CATALYST_ENV:-production}
      CATALYST_DEBUG: ${CATALYST_DEBUG:-0}
      CATALYST_HOME: /opt/comserv
      
      # Timezone
      TZ: ${TZ:-UTC}
    ports:
      # Application port
      - "${WEB_PORT:-3000}:3000"
    volumes:
      # Application code (development mode)
      - ${APP_MOUNT:-.}/Comserv:/opt/comserv:delegated
      # Persistent logs
      - comserv_logs:/opt/comserv/root/log
      # Persistent session data
      - comserv_sessions:/opt/comserv/root/session
      # Persistent backups
      - comserv_backups:/opt/comserv/backups
    networks:
      - comserv_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
      - NET_RAW
    cap_add:
      - NET_BIND_SERVICE
    # Limit resource usage
    deploy:
      resources:
        limits:
          cpus: '${WEB_CPU_LIMIT:-2}'
          memory: ${WEB_MEMORY_LIMIT:-1024M}
        reservations:
          cpus: '${WEB_CPU_REQUEST:-0.5}'
          memory: ${WEB_MEMORY_REQUEST:-512M}

  # ===================================================================
  # Nginx Reverse Proxy (Optional - for production)
  # ===================================================================
  nginx:
    image: nginx:alpine
    container_name: comserv-nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - comserv_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

# ===================================================================
# Network Definition
# ===================================================================
networks:
  comserv_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ===================================================================
# Persistent Volumes
# ===================================================================
volumes:
  mysql_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MYSQL_DATA_PATH:-./.docker/mysql}

  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${REDIS_DATA_PATH:-./.docker/redis}

  comserv_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${COMSERV_LOGS_PATH:-./.docker/logs}

  comserv_sessions:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${COMSERV_SESSIONS_PATH:-./.docker/sessions}

  comserv_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${COMSERV_BACKUPS_PATH:-./.docker/backups}

  nginx_cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${NGINX_CACHE_PATH:-./.docker/nginx_cache}